<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Het Kattenhuis van Sep</title>
<style>
  :root {
    --blauw: #2b8cff;
    --groen: #2ecc40;
    --oranje: #ff851b;
    --geel: #ffd700;
    --rood: #ff4136;
    --paars: #9b59b6;
    --lucht: #7ec8ff;
    --hout-l: #f2b56f;
    --hout: #dd9346;
    --hout-d: #8a4d1d;
    --schaduw: 0 6px 0 rgba(0,0,0,.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font-family: "Comic Sans MS", "Chalkboard SE", "Comic Neue", "Segoe UI", cursive, sans-serif;
    background: linear-gradient(#5db4ff, #a8dcff 55%, #cdf3d0);
    touch-action: none;
  }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 1; }

  /* ---------- decor: zon, wolken, heuvels ---------- */
  #scenery { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  #sun { position: absolute; top: 3vmin; left: 4vmin; width: 20vmin; height: 20vmin; }
  #sun-rays {
    position: absolute; inset: -60%;
    border-radius: 50%;
    background: repeating-conic-gradient(rgba(255,216,64,.4) 0 9deg, transparent 9deg 24deg);
    animation: spin-slow 44s linear infinite;
  }
  #sun-core {
    position: absolute; inset: 14%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff9d6, #ffdf57 55%, #ffb200);
    box-shadow: 0 0 6vmin rgba(255,200,60,.8);
  }
  .cloud {
    position: absolute;
    height: 6vmin; width: 17vmin;
    background: linear-gradient(#ffffff, #eef6ff);
    border-radius: 999px;
    opacity: .92;
    box-shadow: 4.5vmin -2.4vmin 0 -1vmin #fff, -5vmin -1.8vmin 0 -1.6vmin #fff, 0 .6vmin 1.2vmin rgba(60,110,180,.18);
    animation: cloud-drift linear infinite;
  }
  .cloud.c1 { top: 13%; animation-duration: 75s; }
  .cloud.c2 { top: 30%; height: 4.4vmin; width: 12vmin; animation-duration: 105s; animation-delay: -48s; opacity: .8; }
  .cloud.c3 { top: 5%; height: 7.5vmin; width: 22vmin; animation-duration: 130s; animation-delay: -90s; }
  .hill { position: absolute; border-radius: 50%; }
  .hill.h1 { left: -18vw; bottom: -16vmin; width: 75vw; height: 28vmin; background: linear-gradient(#a1e6a1, #5cb85c); }
  .hill.h2 { right: -22vw; bottom: -18vmin; width: 80vw; height: 30vmin; background: linear-gradient(#8bd98b, #4aa34a); }

  /* ---------- algemene knoppen (glossy 3D) ---------- */
  button {
    font-family: inherit;
    border: none;
    cursor: pointer;
    color: inherit;
  }
  .big-btn {
    position: relative;
    font-size: clamp(20px, 4vmin, 34px);
    font-weight: bold;
    padding: .5em 1.2em;
    border-radius: 999px;
    background: linear-gradient(#ffe466, #ffc400 55%, #f0a800);
    border: 3px solid rgba(255,255,255,.95);
    box-shadow: 0 .38em 0 rgba(0,0,0,.28), 0 .7em 1.2em rgba(0,0,0,.22), inset 0 .28em 0 rgba(255,255,255,.5);
    transition: transform .1s, box-shadow .1s;
    overflow: hidden;
  }
  .big-btn::after {
    content: "";
    position: absolute; top: 6%; left: 8%; right: 8%; height: 38%;
    border-radius: 999px;
    background: linear-gradient(rgba(255,255,255,.65), rgba(255,255,255,0));
    pointer-events: none;
  }
  .big-btn:active { transform: translateY(.28em) scale(.97); box-shadow: 0 .1em 0 rgba(0,0,0,.28), inset 0 .28em 0 rgba(255,255,255,.5); }
  .icon-btn {
    font-size: clamp(26px, 5.5vmin, 44px);
    width: 1.9em; height: 1.9em;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 26%, #ffffff, #e4ecf7 70%, #c8d6ea);
    border: 3px solid rgba(255,255,255,.95);
    box-shadow: 0 .16em 0 rgba(0,0,0,.25), 0 .4em .8em rgba(0,0,0,.2), inset 0 .12em 0 rgba(255,255,255,.8);
    display: grid; place-items: center;
    transition: transform .1s, box-shadow .1s;
  }
  .icon-btn:active { transform: translateY(.12em) scale(.92); box-shadow: 0 .04em 0 rgba(0,0,0,.25); }
  .icon-btn:hover { transform: scale(1.06); }

  /* ---------- kop van elke kamer ---------- */
  .room-top {
    display: flex; align-items: center; gap: 2vmin;
    padding: 1.2vmin clamp(64px, 12vmin, 100px) 1.2vmin 2vmin;
    flex: 0 0 auto;
  }
  .room-title {
    font-size: clamp(22px, 5vmin, 42px);
    font-weight: bold;
    color: #fff;
    -webkit-text-stroke: 1.5px rgba(0,0,0,.18);
    text-shadow: 0 .35vmin 0 rgba(0,0,0,.3), 0 .7vmin 1.4vmin rgba(0,0,0,.25);
    transform: rotate(-.6deg);
    flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .room-body { flex: 1; position: relative; overflow: hidden; }
  .room-body::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.13) 22%, transparent 24%);
    background-size: 5vmin 5vmin;
    pointer-events: none;
  }

  /* ---------- start-overlay ---------- */
  #start-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: radial-gradient(circle at 50% 38%, #6cb9ff, #2b8cff 55%, #1a5bbf);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #start-overlay::before {
    content: "";
    position: absolute; left: 50%; top: 50%;
    width: 220vmax; height: 220vmax;
    margin: -110vmax 0 0 -110vmax;
    background: repeating-conic-gradient(rgba(255,255,255,.13) 0 11deg, transparent 11deg 26deg);
    animation: spin-slow 40s linear infinite;
  }
  #start-card {
    position: relative;
    background: linear-gradient(#ffffff, #fff2d9);
    border: .9vmin solid #fff;
    border-radius: 4.5vmin;
    padding: 4vmin 6.5vmin;
    text-align: center;
    box-shadow: 0 1.6vmin 0 rgba(0,0,0,.22), 0 4vmin 8vmin rgba(0,20,60,.45);
    animation: pop-in .5s;
    max-width: 90vw;
  }
  #start-card::after {
    content: "⭐";
    position: absolute; top: -2.6vmin; right: -2vmin;
    font-size: clamp(30px, 7vmin, 60px);
    filter: drop-shadow(0 4px 0 rgba(0,0,0,.2));
    animation: wiggle 2.2s ease-in-out infinite;
  }
  #start-card h1 {
    margin: 1vmin 0 2.4vmin;
    font-size: clamp(28px, 6.5vmin, 56px);
    background: linear-gradient(#ff851b, #ff4136);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 3px 0 rgba(0,0,0,.15));
    letter-spacing: .02em;
  }
  #start-card .cat-wrap { width: clamp(110px, 24vmin, 200px); margin: 0 auto; animation: floaty 2.5s ease-in-out infinite; filter: drop-shadow(0 1vmin 1.5vmin rgba(0,0,0,.25)); }
  #start-btn {
    background: linear-gradient(#6fe08a, #2ecc40 55%, #1d9e4c);
    color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,.25);
    animation: pulse 1.6s ease-in-out infinite;
  }

  /* ---------- geluid-knop ---------- */
  #sound-btn { position: fixed; top: 1.2vmin; right: 1.4vmin; z-index: 400; }

  /* ---------- het huis (hub) ---------- */
  #hub { display: flex; flex-direction: column; height: 100%; }
  #hub-title {
    text-align: center;
    font-size: clamp(24px, 5.5vmin, 46px);
    font-weight: bold;
    color: #fff;
    -webkit-text-stroke: 1.5px rgba(30,80,140,.35);
    text-shadow: 0 .4vmin 0 rgba(20,70,130,.35), 0 .9vmin 1.8vmin rgba(0,40,90,.3);
    padding: 1vmin 12vmin 0.5vmin 12vmin;
    transform: rotate(-.6deg);
  }
  #house {
    flex: 1; display: flex; flex-direction: column;
    width: min(92vw, 130vmin);
    margin: 0 auto;
    min-height: 0;
    filter: drop-shadow(0 2.2vmin 2.6vmin rgba(20,60,20,.3));
  }
  #roof-wrap {
    flex: 0 0 auto;
    position: relative;
    height: clamp(48px, 11vmin, 96px);
  }
  #chimney {
    position: absolute;
    left: 72%; bottom: 18%;
    width: clamp(22px, 5vmin, 44px);
    height: 88%;
    background: linear-gradient(90deg, #c05a4e, #9c4238);
    border-top: .8vmin solid #7d332b;
    border-radius: .6vmin .6vmin 0 0;
  }
  .smoke {
    position: absolute;
    left: -30%; bottom: 95%;
    font-size: clamp(16px, 3.6vmin, 32px);
    opacity: 0;
    animation: smoke-rise 3.4s ease-out infinite;
  }
  .smoke.s2 { animation-delay: 1.1s; left: 5%; }
  .smoke.s3 { animation-delay: 2.2s; left: -12%; }
  #roof {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(to bottom, rgba(255,255,255,.14) 0 2px, transparent 2px 24%),
      linear-gradient(#ff7a6e, #d63c3c);
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
  }
  #attic {
    position: absolute;
    left: 50%; bottom: 4%;
    transform: translateX(-50%);
    width: clamp(30px, 7vmin, 60px);
    height: clamp(30px, 7vmin, 60px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #cfe8ff 70%);
    border: .7vmin solid #ffd93b;
    box-shadow: 0 .4vmin .8vmin rgba(0,0,0,.3);
    display: grid; place-items: center;
    font-size: clamp(16px, 4vmin, 36px);
    line-height: 1;
  }
  #rooms {
    flex: 1;
    position: relative;
    background:
      radial-gradient(rgba(90,45,8,.35) 1px, transparent 1.6px),
      repeating-linear-gradient(to bottom, rgba(120,60,10,.08) 0 2px, transparent 2px 24%),
      linear-gradient(var(--hout-l), var(--hout));
    background-size: 7vmin 7vmin, auto, auto;
    border: 1.2vmin solid var(--hout-d);
    border-top: none;
    border-radius: 0 0 3vmin 3vmin;
    box-shadow: inset 0 1vmin 0 rgba(255,255,255,.3), inset 0 -1.2vmin 0 rgba(90,45,8,.25);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 1.6vmin;
    padding: 3vmin 2vmin 2vmin;
    min-height: 0;
  }
  .room-door {
    position: relative;
    border-radius: 45% 45% 1.8vmin 1.8vmin / 26% 26% 1.8vmin 1.8vmin;
    border: .55vmin solid rgba(255,255,255,.9);
    box-shadow: 0 .7vmin 0 rgba(80,40,5,.35), inset 0 -1.2vmin 0 rgba(0,0,0,.2), inset 0 .8vmin 0 rgba(255,255,255,.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .8vmin;
    color: #fff;
    font-weight: bold;
    font-size: clamp(12px, 2.5vmin, 23px);
    transition: transform .12s, box-shadow .12s;
    padding: .8vmin;
    overflow: hidden;
  }
  .room-door::after {
    content: "";
    position: absolute; top: 3%; left: 10%; right: 10%; height: 26%;
    border-radius: 999px;
    background: linear-gradient(rgba(255,255,255,.4), rgba(255,255,255,0));
    pointer-events: none;
  }
  .room-door:hover { transform: translateY(-.5vmin) scale(1.04); box-shadow: 0 1.2vmin 0 rgba(80,40,5,.35), 0 1.6vmin 2.4vmin rgba(0,0,0,.25), inset 0 -1.2vmin 0 rgba(0,0,0,.2), inset 0 .8vmin 0 rgba(255,255,255,.3); }
  .room-door:active { transform: translateY(.3vmin) scale(.96); }
  .room-door .r-icon {
    width: clamp(44px, 10vmin, 92px);
    height: clamp(44px, 10vmin, 92px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 28%, #ffffff, #e9eef7 75%);
    box-shadow: 0 .5vmin 0 rgba(0,0,0,.22), inset 0 -.6vmin 0 rgba(0,0,0,.08);
    display: grid; place-items: center;
    font-size: clamp(26px, 6.2vmin, 56px);
    line-height: 1;
  }
  .room-door .r-name {
    background: linear-gradient(#ffedd1, #fbd39c);
    color: #7a4a18;
    border-radius: 999px;
    padding: .12em .8em;
    box-shadow: 0 .3vmin 0 rgba(90,50,10,.35);
    white-space: nowrap;
  }
  #hub-bottom {
    flex: 0 0 auto;
    position: relative;
    display: flex; align-items: flex-end; justify-content: center;
    gap: 3vmin;
    margin-top: 1vmin;
    padding: .6vmin 2vmin 1.2vmin;
    font-size: clamp(30px, 7vmin, 60px);
    background: linear-gradient(#6fd873, #33a04a);
    border-radius: 3vmin 3vmin 0 0;
    box-shadow: inset 0 .8vmin 0 rgba(255,255,255,.3);
  }
  .veld-bloem { font-size: .55em; align-self: center; filter: drop-shadow(1px 2px 0 rgba(0,60,0,.25)); }
  .hub-cat, .hub-toy {
    background: none; border: none;
    font-size: inherit;
    filter: drop-shadow(2px 4px 0 rgba(0,60,0,.3));
    transition: transform .15s;
  }
  .hub-cat:hover, .hub-toy:hover { transform: scale(1.15) rotate(-4deg); }

  /* ---------- memory ---------- */
  #memory-grid {
    position: absolute; inset: 0;
    display: grid; gap: 1.5vmin;
    padding: 2vmin;
    place-content: center;
  }
  .mem-card { perspective: 600px; background: none; padding: 0; width: var(--card); height: var(--card); }
  .mem-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .35s;
  }
  .mem-card.flipped .mem-inner, .mem-card.matched .mem-inner { transform: rotateY(180deg); }
  .mem-face {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    border-radius: 1.8vmin;
    backface-visibility: hidden;
    font-size: calc(var(--card) * .55);
    border: .45vmin solid #fff;
    box-shadow: 0 .6vmin 0 rgba(0,0,0,.25), 0 1vmin 1.6vmin rgba(0,0,0,.18);
  }
  .mem-front { background: radial-gradient(circle at 32% 24%, #6db9ff, #1565d8 78%); }
  .mem-front::before {
    content: "";
    position: absolute; inset: 9%;
    border: .4vmin dashed rgba(255,255,255,.55);
    border-radius: 1.2vmin;
  }
  .mem-front::after {
    content: "🐾";
    font-size: calc(var(--card) * .42);
    transform: rotate(-14deg);
    filter: drop-shadow(0 .3vmin 0 rgba(0,0,0,.3));
  }
  .mem-back { background: radial-gradient(circle at 50% 28%, #ffffff, #eef4ff); transform: rotateY(180deg); border-color: #ffd93b; }
  .mem-card.matched .mem-back { background: radial-gradient(circle at 50% 28%, #eaffe9, #c9f5c7); border-color: #6fe08a; animation: pop-in .4s; }

  /* ---------- puzzel & vormen ---------- */
  .drag-item { position: absolute; touch-action: none; cursor: grab; }
  .drag-item.dragging { z-index: 50; cursor: grabbing; filter: drop-shadow(0 8px 6px rgba(0,0,0,.3)); }
  .drag-item.locked { cursor: default; }
  .puz-slot-line { position: absolute; background: rgba(255,255,255,.6); }

  /* ---------- knoppenrijen ---------- */
  .choice-row {
    display: flex; gap: 1.5vmin; flex-wrap: wrap; justify-content: center; align-items: center;
  }
  .level-btn {
    font-size: clamp(16px, 3vmin, 26px);
    padding: .3em .9em;
    border-radius: 999px;
    background: linear-gradient(#ffffff, #e8eef7);
    border: 3px solid rgba(255,255,255,.95);
    box-shadow: 0 .3em 0 rgba(0,0,0,.22), inset 0 .18em 0 rgba(255,255,255,.8);
    font-weight: bold;
    color: #3a4a63;
    transition: transform .1s;
  }
  .level-btn:active { transform: translateY(.2em) scale(.95); box-shadow: 0 .05em 0 rgba(0,0,0,.22); }
  .level-btn.active {
    background: linear-gradient(#ffe466, #ffc400);
    color: #7a4a00;
    transform: scale(1.1);
    box-shadow: 0 .3em 0 rgba(160,100,0,.4), 0 0 1.4vmin rgba(255,220,80,.8), inset 0 .18em 0 rgba(255,255,255,.6);
  }

  /* ---------- tellen ---------- */
  #count-stage {
    position: absolute; inset: 0 0 30% 0;
    display: flex; flex-wrap: wrap; align-content: center; justify-content: center;
    gap: 2vmin;
    font-size: clamp(36px, 9vmin, 90px);
    padding: 2vmin;
  }
  #count-stage span { animation: floaty 2s ease-in-out infinite; filter: drop-shadow(2px 4px 0 rgba(0,0,0,.15)); }
  #count-answers {
    position: absolute; left: 0; right: 0; bottom: 2vmin;
    display: flex; justify-content: center; gap: 3vmin;
  }
  .num-btn {
    font-size: clamp(30px, 7vmin, 64px);
    width: 2em; height: 2em;
    border-radius: 2.2vmin;
    background: linear-gradient(#ffffff, #e6eefc);
    border: .55vmin solid #fff;
    font-weight: bold;
    color: var(--blauw);
    text-shadow: 0 2px 0 rgba(30,90,180,.15);
    box-shadow: 0 .7vmin 0 rgba(40,50,90,.35), 0 1.2vmin 2vmin rgba(0,0,0,.2), inset 0 .5vmin 0 rgba(255,255,255,.9);
    transition: transform .1s, box-shadow .1s;
  }
  .num-btn:hover { transform: translateY(-.3vmin) scale(1.05); }
  .num-btn:active { transform: translateY(.4vmin) scale(.93); box-shadow: 0 .15vmin 0 rgba(40,50,90,.35); }

  /* ---------- kleuren ---------- */
  #paint-wrap { position: absolute; inset: 0; display: flex; }
  #paint-tools {
    flex: 0 0 auto;
    display: flex; flex-direction: column; gap: 1vmin;
    padding: 1.5vmin 1.2vmin;
    margin: 1.5vmin 0 1.5vmin 1.5vmin;
    align-items: center;
    overflow-y: auto;
    background:
      repeating-linear-gradient(to bottom, rgba(120,60,10,.09) 0 2px, transparent 2px 18%),
      linear-gradient(#e8b578, #c98a4b);
    border: .55vmin solid #8a5a24;
    border-radius: 2.5vmin;
    box-shadow: inset 0 .5vmin 0 rgba(255,255,255,.35), 0 .8vmin 0 rgba(90,20,10,.35);
  }
  .paint-color {
    width: clamp(34px, 6vmin, 54px); height: clamp(34px, 6vmin, 54px);
    border-radius: 50%;
    border: 4px solid #fff;
    box-shadow: var(--schaduw);
    transition: transform .1s;
  }
  .paint-color.active { transform: scale(1.25); border-color: #333; }
  #paint-board {
    flex: 1; position: relative; margin: 1.5vmin;
    background: #fff; border-radius: 1.2vmin;
    border: 1.2vmin solid #b5773a;
    box-shadow: 0 0 0 .55vmin #8a5a24, 0 1vmin 0 rgba(90,20,10,.35), 0 1.8vmin 3vmin rgba(0,0,0,.25), inset 0 0 2vmin rgba(0,0,0,.06);
    overflow: hidden;
  }
  #paint-canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
  #paint-outline { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  /* ---------- verkleedkamer ---------- */
  #dress-wrap { position: absolute; inset: 0; display: flex; align-items: stretch; }
  #dress-cat { flex: 1; display: grid; place-items: center; min-width: 0; position: relative; z-index: 1; }
  #dress-cat svg { width: min(84%, 66vmin); height: 88%; }
  #dress-vriend {
    position: absolute; right: 8%; bottom: 10%;
    font-size: clamp(40px, 11vmin, 100px);
    filter: drop-shadow(2px 4px 2px rgba(0,0,0,.3));
    animation: floaty 2.4s ease-in-out infinite;
    pointer-events: none;
  }
  #dress-panel {
    flex: 0 0 auto; width: clamp(150px, 26vmin, 260px);
    display: flex; flex-direction: column; gap: 1.2vmin;
    padding: 1.5vmin; overflow-y: auto;
  }
  .dress-btn {
    font-size: clamp(16px, 3.2vmin, 28px);
    padding: .45em .7em;
    border-radius: 999px;
    background: linear-gradient(#ffffff, #e9f2f1);
    border: 3px solid rgba(255,255,255,.95);
    box-shadow: 0 .5vmin 0 rgba(0,80,75,.3), inset 0 .3vmin 0 rgba(255,255,255,.9);
    font-weight: bold;
    color: #0b5d58;
    text-align: left;
    transition: transform .1s, box-shadow .1s;
  }
  .dress-btn:hover { transform: translateX(-.4vmin); }
  .dress-btn:active { transform: translateY(.3vmin) scale(.96); box-shadow: 0 .1vmin 0 rgba(0,80,75,.3); }

  /* ---------- speelkamer ---------- */
  #busy-grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 2vmin; padding: 2.5vmin;
  }
  .busy-cell {
    background: linear-gradient(#ffffff, #ffe9f6);
    border: .5vmin solid rgba(255,255,255,.95);
    border-radius: 2.8vmin;
    box-shadow: 0 .8vmin 0 rgba(140,10,100,.3), inset 0 .5vmin 0 rgba(255,255,255,.9);
    display: grid; place-items: center;
    font-size: clamp(30px, 7vmin, 64px);
    overflow: hidden;
  }
  .busy-btn {
    height: 72%; max-width: 82%; aspect-ratio: 1;
    border-radius: 50%;
    box-shadow: inset 0 -8px 0 rgba(0,0,0,.25), var(--schaduw);
    font-size: clamp(24px, 6vmin, 54px);
    display: grid; place-items: center;
  }
  .busy-btn:active { box-shadow: inset 0 4px 0 rgba(0,0,0,.25); transform: translateY(4px); }
  .lamp { transition: filter .2s, opacity .2s; opacity: .3; filter: grayscale(1); }
  .lamp.on { opacity: 1; filter: none; animation: pop-in .3s; }
  .switch {

<script>
"use strict";

/* ============================================================
   Hulpjes
   ============================================================ */
const $ = sel => document.querySelector(sel);
const NAAM = "Sep";
const randInt = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================================
   Geluid (WebAudio, geen bestanden)
   ============================================================ */
let audioCtx = null;
let soundOn = localStorage.getItem("kh_sound") !== "uit";

function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function tone(freq, dur = 0.15, { type = "sine", vol = 0.2, delay = 0, glide = null } = {}) {
  if (!soundOn) return;
  const ac = ctx();
  const t0 = ac.currentTime + delay;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (glide) osc.frequency.exponentialRampToValueAtTime(glide, t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}

function noiseBurst(dur = 0.2, vol = 0.25) {
  if (!soundOn) return;
  const ac = ctx();
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.value = vol;
  src.connect(g).connect(ac.destination);
  src.start();
}

const sfx = {
  klik()   { tone(600, 0.08, { type: "square", vol: 0.08 }); },
  plop()   { tone(300, 0.12, { type: "sine", glide: 700, vol: 0.25 }); },
  goed()   { [523, 659, 784].forEach((f, i) => tone(f, 0.15, { delay: i * 0.09, type: "triangle", vol: 0.22 })); },

let nlVoice = null;
function findVoice() {
  const voices = speechSynthesis.getVoices();
  nlVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("nl")) || null;
}
if ("speechSynthesis" in window) {
  findVoice();
  speechSynthesis.onvoiceschanged = findVoice;
}
function speak(text) {
  if (!soundOn || !("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "nl-NL";
  if (nlVoice) u.voice = nlVoice;
  u.rate = 0.95;
  u.pitch = 1.15;
  speechSynthesis.speak(u);
}

/* ============================================================
   Sleep-hulpje (muis + touch)
   ============================================================ */
function maakSleepbaar(el, { onDrop, onStart } = {}) {
  el.classList.add("drag-item");
  el.addEventListener("pointerdown", e => {
    if (el.classList.contains("locked")) return;
    e.preventDefault();
    if (onStart) onStart(el, e);
    el.setPointerCapture(e.pointerId);
    el.classList.add("dragging");
    const startLeft = parseFloat(el.style.left) || 0;
    const startTop = parseFloat(el.style.top) || 0;
    const px = e.clientX, py = e.clientY;
    const move = ev => {
      el.style.left = startLeft + (ev.clientX - px) + "px";
      el.style.top = startTop + (ev.clientY - py) + "px";
    };
    const up = ev => {
      el.removeEventListener("pointermove", move);
      el.removeEventListener("pointerup", up);
      el.removeEventListener("pointercancel", up);
      el.classList.remove("dragging");
      if (onDrop) onDrop(el, ev);
    };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
  });
}
function midden(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

const MEM_EMOJIS = ["😺", "🚀", "🦖", "⚽", "🚒", "🐟", "🌈", "🦸", "🏴‍☠️", "🐢"];

scenes.memory = function (app) {
  const body = roomTop(app, "🎴 Memory: zoek de paartjes!", "linear-gradient(160deg, #4aa3ff, #1565d8)");
  const top = app.querySelector(".room-top");
  const lvlRow = document.createElement("div");
  lvlRow.className = "choice-row";
  lvlRow.innerHTML = `
    <button class="level-btn" data-p="4">⭐ 4</button>
    <button class="level-btn" data-p="6">⭐⭐ 6</button>
    <button class="level-btn" data-p="8">⭐⭐⭐ 8</button>`;
  top.appendChild(lvlRow);

  decorLaag(body, `
    <div class="speeltafel"></div>
    <span class="hoek-deco" style="left:6%; top:6%; transform:rotate(-20deg)">🐾</span>
    <span class="hoek-deco" style="right:6%; top:6%; transform:rotate(20deg)">🐾</span>
    <span class="hoek-deco" style="left:6%; bottom:6%; transform:rotate(-160deg)">🐾</span>
    <span class="hoek-deco" style="right:6%; bottom:6%; transform:rotate(160deg)">🐾</span>`);
  zwevers(body, ["✨", "⭐"], 4);

  let bezig = false;
  let eerste = null;
  let gevonden = 0;
  let paren = 4;

  function bouw(p) {
    paren = p;
    gevonden = 0;
    eerste = null;
    bezig = false;
    lvlRow.querySelectorAll(".level-btn").forEach(b => b.classList.toggle("active", +b.dataset.p === p));
    body.querySelector("#memory-grid")?.remove();
    const grid = document.createElement("div");
    grid.id = "memory-grid";
    body.appendChild(grid);
    const kolommen = p === 4 ? 4 : p === 6 ? 4 : 4;
    const rijen = Math.ceil((p * 2) / kolommen);
    grid.style.gridTemplateColumns = `repeat(${kolommen}, var(--card))`;
    const kaartMaat = Math.min(
      (body.clientWidth - 60) / kolommen - 12,
      (body.clientHeight - 60) / rijen - 12
    );
    grid.style.setProperty("--card", Math.max(56, kaartMaat) + "px");

    const faces = shuffle(shuffle(MEM_EMOJIS).slice(0, p).flatMap(f => [f, f]));
    for (const face of faces) {
      const kaart = document.createElement("button");
      kaart.className = "mem-card";
      kaart.innerHTML = `<div class="mem-inner">
        <div class="mem-face mem-front"></div>
        <div class="mem-face mem-back">${face}</div>
      </div>`;
      kaart.dataset.face = face;
      kaart.addEventListener("click", () => draai(kaart));
      grid.appendChild(kaart);
    }
  }

  function draai(kaart) {
    if (bezig || kaart.classList.contains("flipped") || kaart.classList.contains("matched")) return;
    sfx.klik();
    kaart.classList.add("flipped");
    if (!eerste) { eerste = kaart; return; }
    bezig = true;
    const a = eerste, b = kaart;
    eerste = null;
    if (a.dataset.face === b.dataset.face) {
      setTimeout(() => {
        a.classList.add("matched"); b.classList.add("matched");
        a.classList.remove("flipped"); b.classList.remove("flipped");
        gevonden++;
        bezig = false;
        if (gevonden === paren) {
          moedigAan();
          setTimeout(() => { awardSticker(); }, 700);
          setTimeout(() => bouw(paren), 3200);
        } else {
          sfx.plop();
        }
      }, 450);
    } else {
      setTimeout(() => {
        a.classList.remove("flipped");
        b.classList.remove("flipped");
        bezig = false;
      }, 900);
    }
  }

  lvlRow.querySelectorAll(".level-btn").forEach(b =>
    b.addEventListener("click", () => { sfx.klik(); bouw(+b.dataset.p); })
  );

  bouw(4);
  speak(`${NAAM}, zoek de twee plaatjes die hetzelfde zijn!`);
};

scenes.puzzel = function (app) {
  const body = roomTop(app, "🧩 Puzzel!", "linear-gradient(160deg, #52d873, #1d9e4c)");
  const top = app.querySelector(".room-top");
  const lvlRow = document.createElement("div");
  lvlRow.className = "choice-row";
  lvlRow.innerHTML = `
    <button class="level-btn" data-g="2,2">⭐ 4</button>
    <button class="level-btn" data-g="3,2">⭐⭐ 6</button>
    <button class="level-btn" data-g="3,3">⭐⭐⭐ 9</button>`;
  top.appendChild(lvlRow);

  let sceneIdx = randInt(0, PUZZEL_SCENES.length - 1);
  let grid = [2, 2];

  function sceneSVG(binnen, vb) {
    return `<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;display:block">${binnen}</svg>`;
  }

  decorLaag(body, `
    <div class="kurkbord"></div>
    <span class="punaise" style="left:3.5%; top:4.5%">📌</span>
    <span class="punaise" style="right:3.5%; top:4.5%">📌</span>
    <span class="punaise" style="left:3.5%; bottom:4.5%">📌</span>
    <span class="punaise" style="right:3.5%; bottom:4.5%">📌</span>
    <span class="tape" style="right:22%; top:6%; transform:rotate(-14deg)"></span>
    <span class="tape" style="right:8%; bottom:9%; transform:rotate(20deg)"></span>`);

  const thumbRow = document.createElement("div");
  thumbRow.className = "choice-row";
  PUZZEL_SCENES.forEach((scene, i) => {
    const t = document.createElement("button");
    t.className = "scene-thumb";
    t.title = scene.naam;
    t.innerHTML = sceneSVG(scene.svg, "0 0 300 300");
    t.addEventListener("click", () => { sfx.plop(); sceneIdx = i; bouw(); });
    thumbRow.appendChild(t);
  });
  top.appendChild(thumbRow);

  const veld = document.createElement("div");
  veld.style.cssText = "position:absolute; inset:0;";
  body.appendChild(veld);

  function bouw() {
    lvlRow.querySelectorAll(".level-btn").forEach(b => b.classList.toggle("active", b.dataset.g === grid.join(",")));
    thumbRow.querySelectorAll(".scene-thumb").forEach((t, i) => t.classList.toggle("active", i === sceneIdx));
    veld.innerHTML = "";
    const scene = PUZZEL_SCENES[sceneIdx];
    const [cols, rows] = grid;
    const totaal = cols * rows;

    const bordMaat = Math.min(body.clientHeight * 0.62, body.clientWidth * 0.55, 460);
    const bord = document.createElement("div");
    bord.style.cssText = `position:absolute; left:3vmin; top:50%; transform:translateY(-56%);
      width:${bordMaat}px; height:${bordMaat}px; border-radius:14px; overflow:hidden;
      border:.6vmin solid #fff;
      box-shadow: 0 .8vmin 0 rgba(0,60,20,.35), 0 1.6vmin 2.6vmin rgba(0,0,0,.25); background:#fff;`;
    bord.innerHTML = `<div style="position:absolute;inset:0;opacity:.28">${sceneSVG(scene.svg, "0 0 300 300")}</div>`;
    veld.appendChild(bord);
    for (let c = 1; c < cols; c++) {
      const l = document.createElement("div");
      l.className = "puz-slot-line";
      l.style.cssText = `left:${(c / cols) * 100}%; top:0; bottom:0; width:2px;`;
      bord.appendChild(l);
    }
    for (let r = 1; r < rows; r++) {
      const l = document.createElement("div");
      l.className = "puz-slot-line";
      l.style.cssText = `top:${(r / rows) * 100}%; left:0; right:0; height:2px;`;
      bord.appendChild(l);
    }

    const stukW = bordMaat / cols, stukH = bordMaat / rows;
    const bordRect = () => bord.getBoundingClientRect();
    const bodyRect = () => body.getBoundingClientRect();
    let klaar = 0;

    const rijenTray = Math.ceil(totaal / 2);
    const rijAfstand = Math.min(stukH + 12, (body.clientHeight - stukH - 28) / Math.max(1, rijenTray - 1));
    const volgorde = shuffle(Array.from({ length: totaal }, (_, i) => i));
    volgorde.forEach((i, n) => {
      const c = i % cols, r = Math.floor(i / cols);
      const stuk = document.createElement("div");
      const vb = `${(300 / cols) * c} ${(300 / rows) * r} ${300 / cols} ${300 / rows}`;
      stuk.innerHTML = sceneSVG(scene.svg, vb);
      stuk.style.width = stukW + "px";
      stuk.style.height = stukH + "px";
      stuk.style.borderRadius = "8px";
      stuk.style.overflow = "hidden";
      stuk.style.boxShadow = "0 4px 8px rgba(0,0,0,.3)";
      const kolomX = body.clientWidth - stukW - 24 - (n % 2) * (stukW + 18);
      stuk.style.left = Math.max(bordMaat + 40, kolomX - randInt(0, 14)) + "px";
      stuk.style.top = Math.min(14 + Math.floor(n / 2) * rijAfstand, body.clientHeight - stukH - 10) + "px";
      veld.appendChild(stuk);

      maakSleepbaar(stuk, {
        onDrop() {
          const br = bordRect();
          const doelX = br.left + c * stukW + stukW / 2;
          const doelY = br.top + r * stukH + stukH / 2;
          const m = midden(stuk);
          const afstand = Math.hypot(m.x - doelX, m.y - doelY);
          if (afstand < Math.min(stukW, stukH) * 0.4) {
            const bo = bodyRect();
            stuk.style.left = br.left - bo.left + c * stukW + "px";
            stuk.style.top = br.top - bo.top + r * stukH + "px";
            stuk.classList.add("locked");
            stuk.style.boxShadow = "none";
            sfx.plop();
            klaar++;
            if (klaar === totaal) {
              moedigAan();
              confetti(30);
              setTimeout(() => awardSticker(), 700);
              setTimeout(() => { sceneIdx = (sceneIdx + 1) % PUZZEL_SCENES.length; bouw(); }, 3400);
            }
          } else {
            sfx.klik();
          }
        },
      });
    });
  }

  lvlRow.querySelectorAll(".level-btn").forEach(b =>
    b.addEventListener("click", () => {
      sfx.klik();
      grid = b.dataset.g.split(",").map(Number);
      bouw();
    })
  );

  bouw();
  speak(`${NAAM}, sleep de puzzelstukjes naar de goede plek!`);
};

  const body = roomTop(app, "🔷 Vormen: sleep naar de schaduw!", "linear-gradient(160deg, #ffab4d, #e06a00)");
  let ronde = 0;

  decorLaag(body, `
    <div class="schoolbord"></div>
    <svg class="krijt" style="left:6%; top:7%; width:10vmin" viewBox="0 0 100 60">
      <path d="M5 50 Q30 10 55 40 T95 20" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/></svg>

      <circle cx="30" cy="30" r="20" stroke="#fff" stroke-width="4" fill="none"/>
      <path d="M60 45 L90 15" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg>
    <svg class="speelkist" style="height:24%" viewBox="0 0 220 70" preserveAspectRatio="xMidYMax meet">
      <rect x="20" y="24" width="180" height="44" rx="7" fill="#a86b32" stroke="#6f4218" stroke-width="4"/>
      <path d="M20 32 Q110 -8 200 32 Z" fill="#c98a4b" stroke="#6f4218" stroke-width="4"/>
      <rect x="98" y="28" width="24" height="18" rx="4" fill="#ffd93b" stroke="#6f4218" stroke-width="3"/>
      <circle cx="110" cy="37" r="3" fill="#6f4218"/>
    </svg>`);
  zwevers(body, ["✏️", "⭐"], 3);

  const veld = document.createElement("div");
  veld.style.cssText = "position:absolute; inset:0;";
  body.appendChild(veld);

  function bouw() {
    veld.innerHTML = "";
    const keuze = shuffle(VORMEN).slice(0, 4);
    const doelen = shuffle(keuze);
    const maat = Math.min(body.clientWidth / 5.2, body.clientHeight / 3.6, 150);
    let klaar = 0;

    doelen.forEach((v, i) => {
      const slot = document.createElement("div");
      slot.dataset.vorm = v.id;
      slot.className = "vorm-slot";
      slot.style.cssText = `position:absolute; width:${maat}px; height:${maat}px;
        left:${(i + 0.35) * (body.clientWidth / 4.7)}px; top:7%;
        background:#fff9ec; border:.4vmin solid #e8d9b8;
        box-shadow: 0 .5vmin .8vmin rgba(0,0,0,.3); border-radius:10px; padding:8px;
        transform: rotate(${randInt(-3, 3)}deg);`;
      slot.innerHTML = `
        <span style="position:absolute; top:-1.9vmin; left:50%; transform:translateX(-50%);
          font-size:2.6vmin; filter:drop-shadow(1px 2px 1px rgba(0,0,0,.35))">📌</span>
        <svg viewBox="0 0 100 100" style="width:100%;height:100%;opacity:.45">${v.svg("#555")}</svg>`;
      veld.appendChild(slot);
    });

    keuze.forEach((v, i) => {
      const stuk = document.createElement("div");
      stuk.dataset.vorm = v.id;
      stuk.style.cssText = `width:${maat}px; height:${maat}px; padding:6px;`;
      stuk.style.left = (i + 0.35) * (body.clientWidth / 4.7) + randInt(-16, 16) + "px";
      stuk.style.top = body.clientHeight - maat - 30 + "px";
      stuk.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%;height:100%">${v.svg(v.kleur)}</svg>`;
      veld.appendChild(stuk);
      const thuisL = stuk.style.left, thuisT = stuk.style.top;

      maakSleepbaar(stuk, {
        onDrop() {
          const m = midden(stuk);
          let geplaatst = false;
          veld.querySelectorAll(".vorm-slot").forEach(slot => {
            if (slot.dataset.bezet) return;
            const sm = midden(slot);
            if (Math.hypot(m.x - sm.x, m.y - sm.y) < maat * 0.5) {
              if (slot.dataset.vorm === stuk.dataset.vorm) {
                const bo = body.getBoundingClientRect();
                const sr = slot.getBoundingClientRect();
                stuk.style.left = sr.left - bo.left + "px";
                stuk.style.top = sr.top - bo.top + "px";
                stuk.classList.add("locked");
                slot.dataset.bezet = "1";
                sfx.plop();
                geplaatst = true;
                klaar++;
                if (klaar === 4) {
                  moedigAan();
                  confetti(25);
                  ronde++;
                  if (ronde % 2 === 0) setTimeout(() => awardSticker(), 700);
                  setTimeout(bouw, 2800);
                }
              } else {
                probeerNog();
                stuk.style.left = thuisL;
                stuk.style.top = thuisT;
                geplaatst = true;

scenes.kleuren = function (app) {
  const body = roomTop(app, "🎨 Kleuren maar!", "linear-gradient(160deg, #ff7a6e, #d63c3c)");
  const top = app.querySelector(".room-top");
  const platenRow = document.createElement("div");
  platenRow.className = "choice-row";
  platenRow.innerHTML = `
    <button class="level-btn" data-plaat="kat">😺</button>
    <button class="level-btn" data-plaat="raket">🚀</button>
    <button class="level-btn" data-plaat="vis">🐟</button>
    <button class="level-btn" data-plaat="auto">🏎️</button>
    <button class="level-btn" data-plaat="dino">🦖</button>
    <button class="level-btn" data-plaat="kasteel">🏰</button>
    <button class="level-btn" id="paint-clear">🧽</button>`;
  top.appendChild(platenRow);

  body.innerHTML = `
    <div id="paint-wrap">
      <div id="paint-tools"></div>
      <div id="paint-board">
        <canvas id="paint-canvas"></canvas>
        <svg id="paint-outline" viewBox="0 0 700 500" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>`;

  const canvas = $("#paint-canvas");
  const board = $("#paint-board");
  const g = canvas.getContext("2d");
  let kleur = PALET[0];
  let dikte = 18;
  let strepen = 0;
  let stickerGegeven = false;

  function maten() {
    canvas.width = board.clientWidth;
    canvas.height = board.clientHeight;
    g.fillStyle = "#fff";
    g.fillRect(0, 0, canvas.width, canvas.height);
  }
  maten();

  const tools = $("#paint-tools");
  PALET.forEach(k => {
    const b = document.createElement("button");
    b.className = "paint-color";
    b.style.background = k;
    b.addEventListener("click", () => {
      sfx.klik();
      kleur = k;
      tools.querySelectorAll(".paint-color").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
    });
    tools.appendChild(b);
  });
  tools.firstChild.classList.add("active");
  [["🖌️", 10], ["🖍️", 22], ["🪣", 44]].forEach(([icoon, d]) => {
    const b = document.createElement("button");
    b.className = "icon-btn";
    b.textContent = icoon;
    b.addEventListener("click", () => { sfx.klik(); dikte = d; });
    tools.appendChild(b);
  });

  function zetPlaat(naam) {
    $("#paint-outline").innerHTML = KLEURPLATEN[naam];
    platenRow.querySelectorAll("[data-plaat]").forEach(b => b.classList.toggle("active", b.dataset.plaat === naam));
  }
  zetPlaat("kat");

  platenRow.querySelectorAll("[data-plaat]").forEach(b =>
    b.addEventListener("click", () => { sfx.plop(); zetPlaat(b.dataset.plaat); })
  );
  $("#paint-clear").addEventListener("click", () => {
    sfx.boing();
    g.fillStyle = "#fff";
    g.fillRect(0, 0, canvas.width, canvas.height);
    speak(`Een lekker schoon vel, ${NAAM}!`);
  });

  let tekent = false, vx = 0, vy = 0;
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    return [e.clientX - r.left, e.clientY - r.top];
  }
  canvas.addEventListener("pointerdown", e => {
    tekent = true;
    canvas.setPointerCapture(e.pointerId);
    [vx, vy] = pos(e);
    g.fillStyle = kleur;
    g.beginPath();
    g.arc(vx, vy, dikte / 2, 0, Math.PI * 2);
    g.fill();
  });
  canvas.addEventListener("pointermove", e => {
    if (!tekent) return;
    const [x, y] = pos(e);
    g.strokeStyle = kleur;
    g.lineWidth = dikte;
    g.lineCap = "round";
    g.beginPath();
    g.moveTo(vx, vy);
    g.lineTo(x, y);
    g.stroke();
    [vx, vy] = [x, y];
  });
  canvas.addEventListener("pointerup", () => {
    if (!tekent) return;
    tekent = false;
    strepen++;
    if (strepen === 15 && !stickerGegeven) {
      stickerGegeven = true;
      speak(`Wat een mooie tekening, ${NAAM}!`);
      setTimeout(() => awardSticker(), 800);
    }
  });

  speak(`${NAAM}, kies een kleur en maak de mooiste tekening!`);
};

    ["hoed", "🎩 Hoed"],
    ["bril", "🕶️ Bril"],
    ["cape", "🦸 Cape"],
    ["vleugels", "🦋 Vleugels"],
    ["ding", "⚔️ Erbij"],
    ["vriend", "🐶 Vriendje"],
  ];
  for (const [sleutel, label] of knoppen) {
    const b = document.createElement("button");
    b.className = "dress-btn";
    b.textContent = label;
    b.addEventListener("click", () => {
      sfx.plop();
      staat[sleutel] = (staat[sleutel] + 1) % DRESS_OPTIES[sleutel].length;
      teken();
      const labels = DRESS_LABELS[sleutel];
      const waarde = DRESS_OPTIES[sleutel][staat[sleutel]];
      if (labels && labels[waarde] && waarde !== "geen") speak(labels[waarde].replace(/^\S+\s/, ""));
    });
    panel.appendChild(b);
  }
  const hussel = document.createElement("button");
  hussel.className = "dress-btn";
  hussel.style.background = "var(--geel)";
  hussel.textContent = "🎲 Husselen!";
  hussel.addEventListener("click", () => {
    sfx.boing();
    for (const k of Object.keys(staat)) staat[k] = randInt(0, DRESS_OPTIES[k].length - 1);
    teken();
    speak(pick(["Tada! Wat een gekke kat!", "Hihi, kijk nou!", `Wauw ${NAAM}, wat een stoere kat!`]));
  });
  panel.appendChild(hussel);

  teken();
  speak(`${NAAM}, klik op de knopjes en verkleed de kat zo stoer als je wilt!`);
};

/* ============================================================
   SPEELKAMER (busy board, Pok Pok-stijl)
   ============================================================ */
scenes.speel = function (app) {
  const body = roomTop(app, "🎪 Speelkamer: druk maar overal op!", "linear-gradient(160deg, #ff5fd0, #ab0b88)");

  let tent = "";
  for (let i = 0; i < 10; i++) tent += `<rect x="${i * 40}" y="0" width="40" height="28" fill="${i % 2 ? "#ffffff" : "#ff5f6d"}"/>`;
  for (let i = 0; i < 10; i++) tent += `<circle cx="${i * 40 + 20}" cy="28" r="20" fill="${i % 2 ? "#ffffff" : "#ff5f6d"}"/>`;
  decorLaag(body, `
    <div class="tentdak"><svg viewBox="0 0 400 48" preserveAspectRatio="none">${tent}</svg></div>
    <div class="lampjes">${"<span></span>".repeat(18)}</div>`);
  zwevers(body, ["🎈", "🎵", "🎶"], 4);

  body.insertAdjacentHTML("beforeend", `<div id="busy-grid" style="padding-top:13.5vmin"></div>`);
  const grid = $("#busy-grid");
  const noten = [262, 330, 392, 523];

  function cel(inhoud) {
    const c = document.createElement("div");
    c.className = "busy-cell";
    c.appendChild(inhoud);
    grid.appendChild(c);
    return c;
  }

  [["#ff4136", 0], ["#ffd700", 1], ["#2ecc40", 2], ["#1e90ff", 3]].forEach(([kl, i]) => {
    const b = document.createElement("button");
    b.className = "busy-btn";
    b.style.background = kl;
    b.addEventListener("pointerdown", () => {
      tone(noten[i], 0.35, { type: "triangle", vol: 0.3 });
      b.parentElement.style.background = kl + "44";
      setTimeout(() => (b.parentElement.style.background = ""), 300);
    });
    cel(b);
  });

  const lampen = [];
  for (let i = 0; i < 2; i++) {
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;gap:1vmin;align-items:center;justify-content:center;width:100%";
    const sw = document.createElement("button");
    sw.className = "switch";
    const lamp = document.createElement("span");
    lamp.className = "lamp";
    lamp.textContent = "💡";
    sw.addEventListener("click", () => {
      sw.classList.toggle("on");
      lamp.classList.toggle("on", sw.classList.contains("on"));
      sfx.klik();
      tone(sw.classList.contains("on") ? 700 : 400, 0.12, { type: "square", vol: 0.1 });
    });
    wrap.append(sw, lamp);
    cel(wrap);
    lampen.push(lamp);
  }

  const sliderWrap = document.createElement("div");
  sliderWrap.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:1vmin;width:100%";
  sliderWrap.innerHTML = `<span style="font-size:.7em">🎚️</span>`;
  const slider = document.createElement("input");
  slider.type = "range";
  slider.className = "busy-slider";
  slider.min = 200; slider.max = 1000; slider.value = 500;
  slider.addEventListener("input", () => tone(+slider.value, 0.08, { type: "sine", vol: 0.12 }));
  sliderWrap.appendChild(slider);
  cel(sliderWrap);

  const toeter = document.createElement("button");
  toeter.className = "busy-btn";
  toeter.style.background = "#ff851b";
  toeter.textContent = "📯";
  toeter.addEventListener("click", () => { sfx.toeter(); toeter.classList.remove("wiggle"); void toeter.offsetWidth; toeter.classList.add("wiggle"); });
  cel(toeter);

  const trommel = document.createElement("button");
  trommel.className = "busy-btn";
  trommel.style.background = "#c39b77";
  trommel.textContent = "🥁";
  trommel.addEventListener("pointerdown", () => sfx.trommel());
  cel(trommel);

  const disco = document.createElement("button");
  disco.className = "busy-btn";
  disco.style.background = "#9b59b6";
  disco.textContent = "🪩";
  disco.addEventListener("click", () => {
    document.body.classList.remove("disco");
    void document.body.offsetWidth;
    document.body.classList.add("disco");
    [523, 659, 784, 659, 523, 784].forEach((f, i) => tone(f, 0.15, { delay: i * 0.15, type: "square", vol: 0.12 }));
    confetti(15);
  });
  cel(disco);

  const xylo = document.createElement("div");
  xylo.style.cssText = "display:flex; gap:1vmin; align-items:flex-end; justify-content:center; width:100%; height:78%;";
  [["#ff5252", 523, 92], ["#ff9f2e", 587, 82], ["#ffd93b", 659, 72], ["#3ed164", 784, 62], ["#2b8cff", 880, 52]].forEach(([kl, f, h]) => {
    const key = document.createElement("button");
    key.className = "xylo-key";
    key.style.background = `linear-gradient(${kl}, ${kl})`;
    key.style.height = h + "%";
    key.addEventListener("pointerdown", () => tone(f, 0.4, { type: "triangle", vol: 0.25 }));
    xylo.appendChild(key);
  });
  cel(xylo);

  const bellen = document.createElement("button");
  bellen.className = "busy-btn";
  bellen.style.background = "#7fd4ff";
  bellen.textContent = "🫧";
  bellen.addEventListener("click", () => {
    for (let i = 0; i < 6; i++) {
      setTimeout(() => {
        floatUp("🫧", randInt(15, 85));
        tone(700 + i * 90, 0.12, { type: "sine", vol: 0.1 });
      }, i * 140);
    }
  });
  cel(bellen);

  const molen = document.createElement("button");
  molen.className = "busy-btn";
  molen.style.background = "#ffd93b";
  molen.textContent = "🎠";
  molen.addEventListener("click", () => {
    molen.classList.remove("spin-once");
    void molen.offsetWidth;
    molen.classList.add("spin-once");
    [523, 659, 784, 659, 523, 392, 523].forEach((f, i) => tone(f, 0.16, { delay: i * 0.14, type: "triangle", vol: 0.15 }));
  });
  cel(molen);

  const VERRASSINGEN = [
    () => { flyAcross("🚀"); tone(200, 0.6, { glide: 900, type: "sawtooth", vol: 0.15 }); },
    () => { flyAcross("🐉"); sfx.boing(); },
    () => { flyAcross("🦋"); tone(800, 0.3, { glide: 1200, vol: 0.12 }); },
    () => { flyAcross("😺"); sfx.miauw(); },
    () => { flyAcross("🛸"); tone(600, 0.7, { glide: 300, type: "sine", vol: 0.15 }); },
    () => { floatUp("🎈"); sfx.plop(); },
    () => { floatUp("⚽"); sfx.boing(); },
    () => { confetti(20); sfx.fanfare(); },
    () => { floatUp("🐸"); tone(300, 0.15, { glide: 600, type: "square", vol: 0.15 }); speak("Kwaak!"); },
  ];
  for (let i = 0; i < 3; i++) {
    const doos = document.createElement("button");
    doos.className = "busy-btn";
    doos.style.background = ["#ffd700", "#2ecc40", "#1e90ff"][i];
    doos.textContent = "🎁";
    doos.addEventListener("click", () => {
      doos.classList.remove("wiggle");
      void doos.offsetWidth;
      doos.classList.add("wiggle");
      sfx.plop();
      pick(VERRASSINGEN)();
    });
    cel(doos);
  }

  speak(`${NAAM}, dit is jouw speelkamer! Druk maar op alle knopjes en kijk wat er gebeurt!`);
};

/* ============================================================
   STICKERBOEK
   ============================================================ */
scenes.stickers = function (app) {
  const body = roomTop(app, `⭐ Stickerboek van ${NAAM}`, `
    repeating-linear-gradient(90deg, rgba(60,30,0,.08) 0 3px, transparent 3px 14vmin),
    linear-gradient(160deg, #c98a4b, #7a4a1e)`);
  body.innerHTML = `<div id="book-wrap"><div id="sticker-shelf"></div><div id="book-page"></div></div>`;
  const shelf = $("#sticker-shelf");
  const page = $("#book-page");
  const s = stickerState();

  let ringen = "";
  for (let i = 0; i < 7; i++) ringen += `<span class="ring" style="top:${9 + i * 12.5}%"></span>`;
  decorLaag(page, `${ringen}
    <span class="washi" style="left:-2.5vmin; top:3vmin; transform:rotate(-38deg); background:rgba(127,212,255,.75)"></span>
    <span class="washi" style="right:-2.5vmin; top:3vmin; transform:rotate(38deg); background:rgba(255,179,224,.75)"></span>
    <span class="washi" style="left:-2.5vmin; bottom:3vmin; transform:rotate(38deg); background:rgba(127,232,154,.75)"></span>
    <span class="washi" style="right:-2.5vmin; bottom:3vmin; transform:rotate(-38deg); background:rgba(255,217,59,.75)"></span>`);

  function bewaar() {
    saveStickerState(s);
  }

  function maakSticker(i) {
    const el = document.createElement("div");
    el.className = "sticker";
    el.textContent = STICKER_POOL[i];
    el.dataset.i = i;
    const p = s.pos[i];
    if (p) {
      el.style.position = "absolute";
      el.style.left = p.x * 100 + "%";
      el.style.top = p.y * 100 + "%";
      page.appendChild(el);
    } else {
      shelf.appendChild(el);
    }
    maakSleepbaar(el, {
      onStart() {
        const r = el.getBoundingClientRect();
        const pr = page.getBoundingClientRect();
        el.style.position = "absolute";
        el.style.left = r.left - pr.left + "px";
        el.style.top = r.top - pr.top + "px";
        if (el.parentElement !== page) page.appendChild(el);
      },
      onDrop() {
        const pr = page.getBoundingClientRect();
        const m = midden(el);
        const er = el.getBoundingClientRect();
        if (m.x < pr.left || m.x > pr.right || m.y < pr.top || m.y > pr.bottom) {
          delete s.pos[el.dataset.i];
          el.style.position = "";
          el.style.left = "";
          el.style.top = "";
          shelf.appendChild(el);
          sfx.klik();
        } else {
          const x = Math.min(Math.max(er.left - pr.left, 0), pr.width - er.width) / pr.width;
          const y = Math.min(Math.max(er.top - pr.top, 0), pr.height - er.height) / pr.height;
          el.style.left = x * 100 + "%";
          el.style.top = y * 100 + "%";
          s.pos[el.dataset.i] = { x, y };
          sfx.plop();
        }
        bewaar();
      },
    });
  }

  for (let i = 0; i < STICKER_POOL.length; i++) {
    if (i < s.earned) {
      maakSticker(i);
    } else {
      const slot = document.createElement("div");
      slot.className = "sticker-locked";
      slot.textContent = "❓";
      shelf.appendChild(slot);
    }
  }

  if (s.earned === 0) {
    speak(`${NAAM}, je hebt nog geen stickers. Speel de spelletjes om stickers te verdienen!`);
  } else {
    speak(`${NAAM}, dit zijn jouw stickers! Sleep ze waar jij wilt.`);
  }
};
