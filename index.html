<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Het Huis van Sep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap">
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/build/three.module.js",
    "three/addons/": "./vendor/three/examples/jsm/"
  }
}
</script>
<style>
  :root {
    --blauw: #4D96FF;
    --groen: #57C24D;
    --oranje: #FF9F1C;
    --geel: #FFD93D;
    --rood: #FF5A5F;
    --paars: #9B5DE5;
    --lucht: #A9E4F5;
    --hout-l: #f2b56f;
    --hout: #dd9346;
    --hout-d: #8a4d1d;
    --schaduw: 0 6px 0 rgba(0,0,0,.18);
    /* speelgoed-palet uit het 3D-ontwerp */
    --toy-teal:#FF5D8F; --toy-teal-d:#D6336C;
    --toy-orange:#FF9F1C; --toy-coral:#FF5A5F; --toy-blue:#4D96FF;
    --toy-purple:#9B5DE5; --toy-pink:#F063A8; --toy-green:#57C24D; --toy-yellow:#FFD93D;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Baloo 2', "Comic Sans MS", system-ui, sans-serif;
    background: linear-gradient(#7FCBEA, #A9E4F5 55%, #E9F7EE);
    touch-action: none;
  }

  /* ── 3D-hub scaffolding (design) ── */
  #scene { position:fixed; inset:0; display:block; z-index:0; }
  #ui { position:fixed; inset:0; pointer-events:none; z-index:10; font-family:'Baloo 2', system-ui, sans-serif; }
  #ui.hidden { display:none; }
  #ui .clickable { pointer-events:auto; }
  .title-wrap{position:absolute;top:22px;left:26px;display:flex;align-items:center;gap:12px;transform:rotate(-2deg);}
  .title-badge{width:56px;height:56px;border-radius:50%;background:var(--toy-teal);display:grid;place-items:center;
    box-shadow:0 6px 0 rgba(150,25,80,.5), 0 10px 20px rgba(0,0,0,.15);border:4px solid #fff;}
  .title-badge svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .title-text{font-weight:800;font-size:34px;letter-spacing:-.01em;color:#fff;
    text-shadow:2px 2px 0 var(--toy-teal-d), 3px 4px 0 rgba(150,25,80,.4), 0 6px 12px rgba(0,0,0,.18);}
  .rbtn{position:absolute;width:56px;height:56px;border-radius:50%;background:#fff;border:4px solid #fff;
    box-shadow:0 5px 0 rgba(26,31,29,.14), 0 8px 18px rgba(0,0,0,.14);display:grid;place-items:center;cursor:pointer;
    transition:transform .12s cubic-bezier(.2,.8,.3,1);}
  .rbtn:hover{transform:translateY(-2px) scale(1.06);}
  .rbtn:active{transform:translateY(2px) scale(.97);box-shadow:0 2px 0 rgba(26,31,29,.14);}
  .rbtn svg{width:26px;height:26px;stroke:var(--toy-teal-d);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  #soundBtn{top:24px;right:26px;}
  #homeBtn{top:24px;right:92px;}
  #homeBtn svg{stroke:var(--toy-coral);}
  .hint{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,.92);padding:10px 20px 10px 16px;border-radius:999px;box-shadow:0 6px 18px rgba(0,0,0,.16);
    font-weight:700;color:#6a5442;font-size:16px;transition:opacity .5s;}
  .hint svg{width:24px;height:24px;stroke:var(--toy-teal-d);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
    animation:hintwig 1.8s ease-in-out infinite;}
  @keyframes hintwig{0%,100%{transform:translateX(-5px)}50%{transform:translateX(5px)}}
  #tip{position:absolute;transform:translate(-50%,-140%);background:#fff;color:#3a2f2a;font-weight:800;font-size:17px;
    padding:7px 16px;border-radius:999px;white-space:nowrap;box-shadow:0 6px 16px rgba(0,0,0,.2);opacity:0;
    transition:opacity .12s;pointer-events:none;}
  #tip::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
    border:7px solid transparent;border-top-color:#fff;border-bottom:0;}
  #modal{position:absolute;inset:0;display:none;place-items:center;background:rgba(26,31,29,.5);backdrop-filter:blur(3px);}
  #modal.open{display:grid;}
  .card{background:#fff;border-radius:28px;padding:36px 40px 32px;max-width:380px;text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,.35);animation:pop .32s cubic-bezier(.2,1.3,.4,1);position:relative;overflow:hidden;}
  @keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
  .card .halo{position:absolute;inset:-40% -10% auto;height:60%;border-radius:50%;opacity:.16;filter:blur(6px);}
  .card .emoji{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;margin:0 auto 18px;
    box-shadow:inset 0 -6px 0 rgba(0,0,0,.12), 0 10px 22px rgba(0,0,0,.18);position:relative;border:5px solid #fff;}
  .card .emoji svg{width:46px;height:46px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;}
  .card h2{font-size:30px;font-weight:800;margin:0 0 6px;color:#3a2f2a;}
  .card p{color:#7c6a5c;font-size:16px;font-weight:500;margin:0 0 24px;line-height:1.4;}
  .card .play{border:none;border-radius:999px;padding:15px 40px;font-size:19px;font-weight:800;color:#fff;cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.18), 0 10px 20px rgba(0,0,0,.18);transition:transform .1s;position:relative;font-family:inherit;}
  .card .play:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.18);}
  .card .close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;border:none;background:#efe6dd;
    cursor:pointer;display:grid;place-items:center;}
  .card .close svg{width:20px;height:20px;stroke:#6a5442;fill:none;stroke-width:2.6;stroke-linecap:round;}
  #confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .conf{position:absolute;top:-20px;width:12px;height:12px;will-change:transform,opacity;}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:0;}}
  #load{position:fixed;inset:0;z-index:50;background:linear-gradient(#BFE7F2,#E6F4F1);display:grid;place-items:center;transition:opacity .5s;}
  #load .box{text-align:center;}
  #load .catload{width:96px;height:96px;margin:0 auto 20px;animation:catbounce 1s ease-in-out infinite;}
  #load .catload svg{width:100%;height:100%;stroke:var(--toy-teal-d);fill:var(--toy-teal);stroke-width:1.5;}
  @keyframes catbounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.05)}}
  #load p{font-weight:800;font-size:22px;color:var(--toy-teal-d);letter-spacing:.02em;font-family:'Baloo 2',system-ui,sans-serif;}
  #load .dots span{animation:blinkd 1.2s infinite}
  #load .dots span:nth-child(2){animation-delay:.2s}#load .dots span:nth-child(3){animation-delay:.4s}
  @keyframes blinkd{0%,100%{opacity:.2}50%{opacity:1}}

  #app { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 20; }
  #app.active { display: flex; }
  #scenery { display: none !important; }
  #sound-btn { display: none; }
  body.in-game #sound-btn { display: grid; }
  #fx-layer, #big-msg { z-index: 30; }

  /* ---------- decor: zon, wolken, heuvels ---------- */
  #scenery { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  #sun { position: absolute; top: 3vmin; left: 4vmin; width: 20vmin; height: 20vmin; }
  #sun-rays {
    position: absolute; inset: -60%;
    border-radius: 50%;
    background: repeating-conic-gradient(rgba(255,216,64,.4) 0 9deg, transparent 9deg 24deg);
    animation: spin-slow 44s linear infinite;
  }
  #sun-core {
    position: absolute; inset: 14%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff9d6, #ffdf57 55%, #ffb200);
    box-shadow: 0 0 6vmin rgba(255,200,60,.8);
  }
  .cloud {
    position: absolute;
    height: 6vmin; width: 17vmin;
    background: linear-gradient(#ffffff, #eef6ff);
    border-radius: 999px;
    opacity: .92;
    box-shadow: 4.5vmin -2.4vmin 0 -1vmin #fff, -5vmin -1.8vmin 0 -1.6vmin #fff, 0 .6vmin 1.2vmin rgba(60,110,180,.18);
    animation: cloud-drift linear infinite;
  }
  .cloud.c1 { top: 13%; animation-duration: 75s; }
  .cloud.c2 { top: 30%; height: 4.4vmin; width: 12vmin; animation-duration: 105s; animation-delay: -48s; opacity: .8; }
  .cloud.c3 { top: 5%; height: 7.5vmin; width: 22vmin; animation-duration: 130s; animation-delay: -90s; }
  .hill { position: absolute; border-radius: 50%; }
  .hill.h1 { left: -18vw; bottom: -16vmin; width: 75vw; height: 28vmin; background: linear-gradient(#a1e6a1, #5cb85c); }
  .hill.h2 { right: -22vw; bottom: -18vmin; width: 80vw; height: 30vmin; background: linear-gradient(#8bd98b, #4aa34a); }

  /* ---------- algemene knoppen (glossy 3D) ---------- */
  button {
    font-family: inherit;
    border: none;
    cursor: pointer;
    color: inherit;
  }
  .big-btn {
    position: relative;
    font-size: clamp(20px, 4vmin, 34px);
    font-weight: bold;
    padding: .5em 1.2em;
    border-radius: 999px;
    background: linear-gradient(#ffe466, #ffc400 55%, #f0a800);
    border: 3px solid rgba(255,255,255,.95);
    box-shadow: 0 .38em 0 rgba(0,0,0,.28), 0 .7em 1.2em rgba(0,0,0,.22), inset 0 .28em 0 rgba(255,255,255,.5);
    transition: transform .1s, box-shadow .1s;
    overflow: hidden;
  }
  .big-btn::after {
    content: "";
    position: absolute; top: 6%; left: 8%; right: 8%; height: 38%;
    border-radius: 999px;
    background: linear-gradient(rgba(255,255,255,.65), rgba(255,255,255,0));
    pointer-events: none;
  }
  .big-btn:active { transform: translateY(.28em) scale(.97); box-shadow: 0 .1em 0 rgba(0,0,0,.28), inset 0 .28em 0 rgba(255,255,255,.5); }
  .icon-btn {
    font-size: clamp(26px, 5.5vmin, 44px);
    width: 1.9em; height: 1.9em;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 26%, #ffffff, #e4ecf7 70%, #c8d6ea);
    border: 3px solid rgba(255,255,255,.95);
    box-shadow: 0 .16em 0 rgba(0,0,0,.25), 0 .4em .8em rgba(0,0,0,.2), inset 0 .12em 0 rgba(255,255,255,.8);
    display: grid; place-items: center;
    transition: transform .1s, box-shadow .1s;
  }
  .icon-btn:active { transform: translateY(.12em) scale(.92); box-shadow: 0 .04em 0 rgba(0,0,0,.25); }
  .icon-btn:hover { transform: scale(1.06); }

  /* ---------- kop van elke kamer ---------- */
  .room-top {
    display: flex; align-items: center; gap: 2vmin;
    padding: 1.2vmin clamp(64px, 12vmin, 100px) 1.2vmin 2vmin;
    flex: 0 0 auto;
  }
  .room-title {
    font-size: clamp(22px, 5vmin, 42px);
    font-weight: bold;
    color: #fff;
    -webkit-text-stroke: 1.5px rgba(0,0,0,.18);
    text-shadow: 0 .35vmin 0 rgba(0,0,0,.3), 0 .7vmin 1.4vmin rgba(0,0,0,.25);
    transform: rotate(-.6deg);
    flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .room-body { flex: 1; position: relative; overflow: hidden; }
  .room-body::before {
    content: "";
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.13) 22%, transparent 24%);
    background-size: 5vmin 5vmin;
    pointer-events: none;
  }

  /* ---------- start-overlay ---------- */
  #start-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: radial-gradient(circle at 50% 38%, #6cb9ff, #2b8cff 55%, #1a5bbf);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #start-overlay::before {
    content: "";
    position: absolute; left: 50%; top: 50%;
    width: 220vmax; height: 220vmax;
    margin: -110vmax 0 0 -110vmax;
    background: repeating-conic-gradient(rgba(255,255,255,.13) 0 11deg, transparent 11deg 26deg);
    animation: spin-slow 40s linear infinite;
  }
  #start-card {
    position: relative;
    background: linear-gradient(#ffffff, #fff2d9);
    border: .9vmin solid #fff;
    border-radius: 4.5vmin;
    padding: 4vmin 6.5vmin;
    text-align: center;
    box-shadow: 0 1.6vmin 0 rgba(0,0,0,.22), 0 4vmin 8vmin rgba(0,20,60,.45);
    animation: pop-in .5s;
    max-width: 90vw;
  }
  #start-card::after {
    content: "⭐";
    position: absolute; top: -2.6vmin; right: -2vmin;
    font-size: clamp(30px, 7vmin, 60px);
    filter: drop-shadow(0 4px 0 rgba(0,0,0,.2));
    animation: wiggle 2.2s ease-in-out infinite;
  }
  #start-card h1 {
    margin: 1vmin 0 2.4vmin;
    font-size: clamp(28px, 6.5vmin, 56px);
    background: linear-gradient(#ff851b, #ff4136);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 3px 0 rgba(0,0,0,.15));
    letter-spacing: .02em;
  }
  #start-card .cat-wrap { width: clamp(110px, 24vmin, 200px); margin: 0 auto; animation: floaty 2.5s ease-in-out infinite; filter: drop-shadow(0 1vmin 1.5vmin rgba(0,0,0,.25)); }
  #start-btn {
    background: linear-gradient(#6fe08a, #2ecc40 55%, #1d9e4c);
    color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,.25);
    animation: pulse 1.6s ease-in-out infinite;
  }

  /* ---------- geluid-knop ---------- */
  #sound-btn { position: fixed; top: 1.2vmin; right: 1.4vmin; z-index: 400; }

  /* ---------- het huis (hub) ---------- */
  #hub { display: flex; flex-direction: column; height: 100%; }
  #hub-title {
    text-align: center;
    font-size: clamp(24px, 5.5vmin, 46px);
    font-weight: bold;
    color: #fff;
    -webkit-text-stroke: 1.5px rgba(30,80,140,.35);
    text-shadow: 0 .4vmin 0 rgba(20,70,130,.35), 0 .9vmin 1.8vmin rgba(0,40,90,.3);
    padding: 1vmin 12vmin 0.5vmin 12vmin;
    transform: rotate(-.6deg);
  }
  #hub { perspective: 190vmin; }
  #house {
    flex: 1; display: flex; flex-direction: column;
    position: relative;
    width: min(92vw, 130vmin);
    margin: 0 auto;
    min-height: 0;
    filter: drop-shadow(0 2.2vmin 2.6vmin rgba(20,60,20,.3));
    transform: rotateX(2deg);
    transition: transform .3s ease-out;
    will-change: transform;
  }
  #roof-wrap {
    flex: 0 0 auto;
    position: relative;
    height: clamp(64px, 14vmin, 130px);
    margin: 0 -2.5%;
  }
  #chimney {
    position: absolute;
    left: 72%; bottom: 18%;
    width: clamp(22px, 5vmin, 44px);
    height: 88%;
    background:
      repeating-linear-gradient(to bottom, rgba(0,0,0,.14) 0 2px, transparent 2px 1.6vmin),
      repeating-linear-gradient(90deg, rgba(0,0,0,.1) 0 2px, transparent 2px 2.4vmin),
      linear-gradient(90deg, #c05a4e, #9c4238);
    border-top: .8vmin solid #7d332b;
    border-radius: 1.4vmin 1.4vmin 0 0;
    box-shadow: inset -1vmin 0 1.2vmin rgba(0,0,0,.25);
  }
  .smoke {
    position: absolute;
    left: -30%; bottom: 95%;
    font-size: clamp(16px, 3.6vmin, 32px);
    opacity: 0;
    animation: smoke-rise 3.4s ease-out infinite;
  }
  .smoke.s2 { animation-delay: 1.1s; left: 5%; }
  .smoke.s3 { animation-delay: 2.2s; left: -12%; }
  #roof {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 32% 12%, rgba(255,255,255,.4), transparent 42%),
      repeating-linear-gradient(to bottom, rgba(255,255,255,.14) 0 2px, transparent 2px 24%),
      linear-gradient(#ff7a6e, #d63c3c);
    border-radius: 50% 50% 0 0 / 105% 105% 0 0;
    box-shadow: inset 0 -1.2vmin 2vmin rgba(120,20,20,.35);
  }
  #attic {
    position: absolute;
    left: 50%; bottom: 4%;
    transform: translateX(-50%);
    width: clamp(30px, 7vmin, 60px);
    height: clamp(30px, 7vmin, 60px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #cfe8ff 70%);
    border: .7vmin solid #ffd93b;
    box-shadow: 0 .4vmin .8vmin rgba(0,0,0,.3);
    display: grid; place-items: center;
    font-size: clamp(16px, 4vmin, 36px);
    line-height: 1;
  }
  #rooms {
    flex: 1;
    position: relative;
    background:
      radial-gradient(rgba(90,45,8,.35) 1px, transparent 1.6px),
      repeating-linear-gradient(to bottom, rgba(120,60,10,.08) 0 2px, transparent 2px 24%),
      linear-gradient(var(--hout-l), var(--hout));
    background-size: 7vmin 7vmin, auto, auto;
    border: 1.2vmin solid var(--hout-d);
    border-top: none;
    border-radius: 0 0 6vmin 6vmin;
    box-shadow: inset 0 1vmin 0 rgba(255,255,255,.3), inset 0 -1.2vmin 0 rgba(90,45,8,.25);
    display: flex;
    flex-direction: column;
    gap: 1.6vmin;
    padding: 3vmin 2vmin 2vmin;
    min-height: 0;
  }
  .verdieping { flex: 1; display: flex; gap: 1.6vmin; min-height: 0; }
  .verdieping .room-door { flex: 1; }
  .verdieping:first-child .room-door { border-radius: 7vmin 7vmin 3vmin 3vmin; }
  .verdieping:last-child .room-door { border-radius: 3vmin 3vmin 4.5vmin 4.5vmin; }
  .room-door {
    position: relative;
    border: none;
    border-radius: 3vmin;
    overflow: hidden;
    box-shadow: inset 0 .8vmin 1.6vmin rgba(0,0,0,.22), inset 0 -0.3vmin .8vmin rgba(0,0,0,.12), 0 .4vmin 0 rgba(90,45,8,.4);
    cursor: pointer;
    padding: 0;
    transition: transform .12s, filter .12s;
  }
  .room-door:hover { transform: scale(1.03); filter: brightness(1.08); z-index: 2; }
  .room-door:active { transform: scale(.96); }
  .room-door::before {
    content: "";
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(255,255,255,.22), transparent 16%),
      linear-gradient(90deg, rgba(0,0,0,.28) 0, transparent 13%, transparent 87%, rgba(0,0,0,.22) 100%),
      linear-gradient(0deg, rgba(0,0,0,.14), transparent 30%);
    pointer-events: none;
    z-index: 1;
  }
  /* behangetjes per kamer */
  .behang-memory   { background: radial-gradient(rgba(255,255,255,.3) 16%, transparent 18%) 0 0/3.4vmin 3.4vmin, linear-gradient(#5aa9f0, #2b7cd8); }
  .behang-puzzel   { background: repeating-linear-gradient(45deg, rgba(255,255,255,.16) 0 1.6vmin, transparent 1.6vmin 3.2vmin), linear-gradient(#54c96e, #2a9648); }
  .behang-vormen   { background: repeating-linear-gradient(90deg, rgba(255,255,255,.18) 0 2.4vmin, transparent 2.4vmin 4.8vmin), linear-gradient(#ffa14d, #e2731a); }
  .behang-tellen   { background: radial-gradient(rgba(255,255,255,.35) 12%, transparent 15%) 0 0/4vmin 5vmin, linear-gradient(#45bede, #1a86b8); }
  .behang-kleuren  { background: radial-gradient(rgba(255,255,255,.25) 15%, transparent 17%) 1vmin 1vmin/4.5vmin 4.5vmin, linear-gradient(#ff7f74, #e04a3c); }
  .behang-verkleden{ background: repeating-linear-gradient(-45deg, rgba(255,255,255,.15) 0 1.8vmin, transparent 1.8vmin 3.6vmin), linear-gradient(#2fc4ba, #0b9186); }
  .behang-speel    { background: radial-gradient(rgba(255,255,255,.3) 18%, transparent 20%) 0 0/3.8vmin 3.8vmin, linear-gradient(#f455cc, #c116a0); }
  .behang-stickers { background: repeating-linear-gradient(45deg, rgba(255,255,255,.2) 0 2vmin, transparent 2vmin 4vmin), linear-gradient(#ffc93d, #e89b00); }
  .k-vloer {
    position: absolute; left: 0; right: 0; bottom: 0; height: 32%;
    background:
      linear-gradient(180deg, rgba(90,45,8,.4), transparent 50%),
      repeating-linear-gradient(90deg, #e8b578 0 4vmin, #d9a05e 4vmin 8vmin);
    transform: perspective(60vmin) rotateX(44deg);
    transform-origin: 50% 100%;
    box-shadow: 0 .5vmin 1vmin rgba(120,60,10,.35);
    pointer-events: none;
  }
  .k-lamp { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 6vmin; height: 5.2vmin; pointer-events: none; }
  .k-lamp::before {
    content: "";
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 2px; height: 32%;
    background: #6f4218;
  }
  .k-lamp::after {
    content: "";
    position: absolute; top: 28%; left: 16%; right: 16%; height: 42%;
    background: linear-gradient(#ffd93b, #ffb200);
    clip-path: polygon(30% 0, 70% 0, 100% 100%, 0 100%);
    box-shadow: 0 1vmin 2.2vmin rgba(255,205,80,.75);
  }
  .k-raam {

function shuffle(arr) {

/* ============================================================
   Geluid (WebAudio, geen bestanden)

let audioCtx = null;
let soundOn = localStorage.getItem("kh_sound") !== "uit";

function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function tone(freq, dur = 0.15, { type = "sine", vol = 0.2, delay = 0, glide = null } = {}) {
  if (!soundOn) return;
  const ac = ctx();
  const t0 = ac.currentTime + delay;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (glide) osc.frequency.exponentialRampToValueAtTime(glide, t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}

function noiseBurst(dur = 0.2, vol = 0.25) {
  if (!soundOn) return;
  const ac = ctx();
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.value = vol;
  src.connect(g).connect(ac.destination);
  src.start();
}

   Nederlandse stem
   ============================================================ */
let nlVoice = null;

// Niet elke Nederlandse stem is even mooi: de oude systeemstemmen (SAPI/eSpeak)
// klinken robotachtig, terwijl de "natural/neural"-stemmen van Edge en de
// Google-stemmen van Chrome veel natuurlijker zijn. Kies daarom de beste.
function stemScore(v) {
  const naam = (v.name || "").toLowerCase();
  const taal = (v.lang || "").toLowerCase().replace("_", "-");
  if (!taal.startsWith("nl")) return -1;
  let s = 0;
  if (naam.includes("natural") || naam.includes("neural")) s += 8;
  if (naam.includes("fenna") || naam.includes("maarten") || naam.includes("colette")) s += 6;
  if (naam.includes("google")) s += 5;
  if (!v.localService) s += 2;
  if (taal === "nl-nl") s += 1;
  if (naam.includes("espeak") || naam.includes("frank")) s -= 5;
  return s;
}
function findVoice() {
  const stemmen = speechSynthesis.getVoices().filter(v => stemScore(v) >= 0);
  stemmen.sort((a, b) => stemScore(b) - stemScore(a));
  nlVoice = stemmen[0] || null;
}
if ("speechSynthesis" in window) {
  findVoice();
  speechSynthesis.onvoiceschanged = findVoice;
}
function speak(text) {
  if (!soundOn || !("speechSynthesis" in window)) return;
  if (!nlVoice) findVoice();
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "nl-NL";
  if (nlVoice) u.voice = nlVoice;
  u.rate = 1;
  u.pitch = 1.04;
  speechSynthesis.speak(u);
}

/* ============================================================
   Sleep-hulpje (muis + touch)
   ============================================================ */
function maakSleepbaar(el, { onDrop, onStart } = {}) {
  el.classList.add("drag-item");
  el.addEventListener("pointerdown", e => {
    if (el.classList.contains("locked")) return;
    e.preventDefault();
    if (onStart) onStart(el, e);
    el.setPointerCapture(e.pointerId);
    el.classList.add("dragging");
    const startLeft = parseFloat(el.style.left) || 0;
    const startTop = parseFloat(el.style.top) || 0;
    const px = e.clientX, py = e.clientY;
    const move = ev => {
      el.style.left = startLeft + (ev.clientX - px) + "px";
      el.style.top = startTop + (ev.clientY - py) + "px";
    };
    const up = ev => {
      el.removeEventListener("pointermove", move);
      el.removeEventListener("pointerup", up);
      el.removeEventListener("pointercancel", up);
      el.classList.remove("dragging");
      if (onDrop) onDrop(el, ev);
    };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
  });
}
function midden(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function launchGame(id) {
  document.body.classList.add("in-game");
  $("#app").classList.add("active");
  const ui = document.getElementById("ui"); if (ui) ui.classList.add("hidden");
  const cv = document.getElementById("scene"); if (cv) cv.style.display = "none";
  if (window.__hub3d) window.__hub3d.pause();
  gaNaar(id);
}
function backToHouse() {
  if (huidigeCleanup) { huidigeCleanup(); huidigeCleanup = null; }
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  $("#app").classList.remove("active");
  $("#app").innerHTML = "";
  document.body.classList.remove("in-game");
  const ui = document.getElementById("ui"); if (ui) ui.classList.remove("hidden");
  const cv = document.getElementById("scene"); if (cv) cv.style.display = "";
  if (window.__hub3d) window.__hub3d.resume();
}

const MEM_EMOJIS = ["😺", "🚀", "🦖", "⚽", "🚒", "🐟", "🌈", "🦸", "🏴‍☠️", "🐢"];

scenes.memory = function (app) {
  const body = roomTop(app, "🎴 Memory: zoek de paartjes!", "linear-gradient(160deg, #FF85AB, #D6336C)");
  const top = app.querySelector(".room-top");
  const lvlRow = document.createElement("div");
  lvlRow.className = "choice-row";
  lvlRow.innerHTML = `
    <button class="level-btn" data-p="4">⭐ 4</button>
    <button class="level-btn" data-p="6">⭐⭐ 6</button>
    <button class="level-btn" data-p="8">⭐⭐⭐ 8</button>`;
  top.appendChild(lvlRow);

  decorLaag(body, `
    <div class="speeltafel"></div>
    <span class="hoek-deco" style="left:6%; top:6%; transform:rotate(-20deg)">🐾</span>
    <span class="hoek-deco" style="right:6%; top:6%; transform:rotate(20deg)">🐾</span>
    <span class="hoek-deco" style="left:6%; bottom:6%; transform:rotate(-160deg)">🐾</span>
    <span class="hoek-deco" style="right:6%; bottom:6%; transform:rotate(160deg)">🐾</span>`);
  zwevers(body, ["✨", "⭐"], 4);

  let bezig = false;
  let eerste = null;
  let gevonden = 0;
  let paren = 4;

  function bouw(p) {
    paren = p;
    gevonden = 0;
    eerste = null;
    bezig = false;
    lvlRow.querySelectorAll(".level-btn").forEach(b => b.classList.toggle("active", +b.dataset.p === p));
    body.querySelector("#memory-grid")?.remove();
    const grid = document.createElement("div");
    grid.id = "memory-grid";
    body.appendChild(grid);
    const kolommen = p === 4 ? 4 : p === 6 ? 4 : 4;
    const rijen = Math.ceil((p * 2) / kolommen);
    grid.style.gridTemplateColumns = `repeat(${kolommen}, var(--card))`;
    const kaartMaat = Math.min(
      (body.clientWidth - 60) / kolommen - 12,
      (body.clientHeight - 60) / rijen - 12
    );
    grid.style.setProperty("--card", Math.max(56, kaartMaat) + "px");

    const faces = shuffle(shuffle(MEM_EMOJIS).slice(0, p).flatMap(f => [f, f]));
    for (const face of faces) {
      const kaart = document.createElement("button");
      kaart.className = "mem-card";
      kaart.innerHTML = `<div class="mem-inner">
        <div class="mem-face mem-front"></div>
        <div class="mem-face mem-back">${face}</div>
      </div>`;
      kaart.dataset.face = face;
      kaart.addEventListener("click", () => draai(kaart));
      grid.appendChild(kaart);
    }
  }

  function draai(kaart) {
    if (bezig || kaart.classList.contains("flipped") || kaart.classList.contains("matched")) return;
    sfx.klik();
    kaart.classList.add("flipped");
    if (!eerste) { eerste = kaart; return; }
    bezig = true;
    const a = eerste, b = kaart;
    eerste = null;
    if (a.dataset.face === b.dataset.face) {
      setTimeout(() => {
        a.classList.add("matched"); b.classList.add("matched");
        a.classList.remove("flipped"); b.classList.remove("flipped");
        gevonden++;
        bezig = false;
        if (gevonden === paren) {
          moedigAan();
          setTimeout(() => { awardSticker(); }, 700);
          setTimeout(() => bouw(paren), 3200);
        } else {
          sfx.plop();
        }
      }, 450);
    } else {
      setTimeout(() => {
        a.classList.remove("flipped");
        b.classList.remove("flipped");
        bezig = false;
      }, 900);
    }
  }

  lvlRow.querySelectorAll(".level-btn").forEach(b =>
    b.addEventListener("click", () => { sfx.klik(); bouw(+b.dataset.p); })
  );

  bouw(4);
  speak(`${NAAM}, zoek de twee plaatjes die hetzelfde zijn!`);
};

scenes.puzzel = function (app) {
  const body = roomTop(app, "🧩 Puzzel!", "linear-gradient(160deg, #FFB84D, #E07E00)");
  const top = app.querySelector(".room-top");
  const lvlRow = document.createElement("div");
  lvlRow.className = "choice-row";
  lvlRow.innerHTML = `
    <button class="level-btn" data-g="2,2">⭐ 4</button>
    <button class="level-btn" data-g="3,2">⭐⭐ 6</button>
    <button class="level-btn" data-g="3,3">⭐⭐⭐ 9</button>`;
  top.appendChild(lvlRow);

  let sceneIdx = randInt(0, PUZZEL_SCENES.length - 1);
  let grid = [2, 2];

  function sceneSVG(binnen, vb) {
    return `<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;display:block">${binnen}</svg>`;
  }

  decorLaag(body, `
    <div class="kurkbord"></div>
    <span class="punaise" style="left:3.5%; top:4.5%">📌</span>
    <span class="punaise" style="right:3.5%; top:4.5%">📌</span>
    <span class="punaise" style="left:3.5%; bottom:4.5%">📌</span>
    <span class="punaise" style="right:3.5%; bottom:4.5%">📌</span>
    <span class="tape" style="right:22%; top:6%; transform:rotate(-14deg)"></span>
    <span class="tape" style="right:8%; bottom:9%; transform:rotate(20deg)"></span>`);

  const thumbRow = document.createElement("div");
  thumbRow.className = "choice-row";
  PUZZEL_SCENES.forEach((scene, i) => {
    const t = document.createElement("button");
    t.className = "scene-thumb";
    t.title = scene.naam;
    t.innerHTML = sceneSVG(scene.svg, "0 0 300 300");
    t.addEventListener("click", () => { sfx.plop(); sceneIdx = i; bouw(); });
    thumbRow.appendChild(t);
  });
  top.appendChild(thumbRow);

  const veld = document.createElement("div");
  veld.style.cssText = "position:absolute; inset:0;";
  body.appendChild(veld);

  function bouw() {
    lvlRow.querySelectorAll(".level-btn").forEach(b => b.classList.toggle("active", b.dataset.g === grid.join(",")));
    thumbRow.querySelectorAll(".scene-thumb").forEach((t, i) => t.classList.toggle("active", i === sceneIdx));
    veld.innerHTML = "";
    const scene = PUZZEL_SCENES[sceneIdx];
    const [cols, rows] = grid;
    const totaal = cols * rows;

    const bordMaat = Math.min(body.clientHeight * 0.62, body.clientWidth * 0.55, 460);
    const bord = document.createElement("div");
    bord.style.cssText = `position:absolute; left:3vmin; top:50%; transform:translateY(-56%);
      width:${bordMaat}px; height:${bordMaat}px; border-radius:14px; overflow:hidden;
      border:.6vmin solid #fff;
      box-shadow: 0 .8vmin 0 rgba(0,60,20,.35), 0 1.6vmin 2.6vmin rgba(0,0,0,.25); background:#fff;`;
    bord.innerHTML = `<div style="position:absolute;inset:0;opacity:.28">${sceneSVG(scene.svg, "0 0 300 300")}</div>`;
    veld.appendChild(bord);
    for (let c = 1; c < cols; c++) {
      const l = document.createElement("div");
      l.className = "puz-slot-line";
      l.style.cssText = `left:${(c / cols) * 100}%; top:0; bottom:0; width:2px;`;
      bord.appendChild(l);
    }
    for (let r = 1; r < rows; r++) {
      const l = document.createElement("div");
      l.className = "puz-slot-line";
      l.style.cssText = `top:${(r / rows) * 100}%; left:0; right:0; height:2px;`;
      bord.appendChild(l);
    }

    const stukW = bordMaat / cols, stukH = bordMaat / rows;
    const bordRect = () => bord.getBoundingClientRect();
    const bodyRect = () => body.getBoundingClientRect();
    let klaar = 0;

    const rijenTray = Math.ceil(totaal / 2);
    const rijAfstand = Math.min(stukH + 12, (body.clientHeight - stukH - 28) / Math.max(1, rijenTray - 1));
    const volgorde = shuffle(Array.from({ length: totaal }, (_, i) => i));
    volgorde.forEach((i, n) => {
      const c = i % cols, r = Math.floor(i / cols);
      const stuk = document.createElement("div");
      const vb = `${(300 / cols) * c} ${(300 / rows) * r} ${300 / cols} ${300 / rows}`;
      stuk.innerHTML = sceneSVG(scene.svg, vb);
      stuk.style.width = stukW + "px";
      stuk.style.height = stukH + "px";
      stuk.style.borderRadius = "8px";
      stuk.style.overflow = "hidden";
      stuk.style.boxShadow = "0 4px 8px rgba(0,0,0,.3)";
      const kolomX = body.clientWidth - stukW - 24 - (n % 2) * (stukW + 18);
      stuk.style.left = Math.max(bordMaat + 40, kolomX - randInt(0, 14)) + "px";
      stuk.style.top = Math.min(14 + Math.floor(n / 2) * rijAfstand, body.clientHeight - stukH - 10) + "px";
      veld.appendChild(stuk);

      maakSleepbaar(stuk, {
        onDrop() {
          const br = bordRect();
          const doelX = br.left + c * stukW + stukW / 2;
          const doelY = br.top + r * stukH + stukH / 2;
          const m = midden(stuk);
          const afstand = Math.hypot(m.x - doelX, m.y - doelY);
          if (afstand < Math.min(stukW, stukH) * 0.4) {
            const bo = bodyRect();
            stuk.style.left = br.left - bo.left + c * stukW + "px";
            stuk.style.top = br.top - bo.top + r * stukH + "px";
            stuk.classList.add("locked");
            stuk.style.boxShadow = "none";
            sfx.plop();
            klaar++;
            if (klaar === totaal) {
              moedigAan();
              confetti(30);
              setTimeout(() => awardSticker(), 700);
              setTimeout(() => { sceneIdx = (sceneIdx + 1) % PUZZEL_SCENES.length; bouw(); }, 3400);
            }
          } else {
            sfx.klik();
          }
        },
      });
    });
  }

  lvlRow.querySelectorAll(".level-btn").forEach(b =>
    b.addEventListener("click", () => {
      sfx.klik();
      grid = b.dataset.g.split(",").map(Number);
      bouw();
    })
  );

  bouw();
  speak(`${NAAM}, sleep de puzzelstukjes naar de goede plek!`);
};

  const body = roomTop(app, "🔷 Vormen: sleep naar de schaduw!", "linear-gradient(160deg, #FF8387, #D63C3C)");
  let ronde = 0;

  decorLaag(body, `

    <svg class="krijt" style="left:6%; top:7%; width:10vmin" viewBox="0 0 100 60">
      <path d="M5 50 Q30 10 55 40 T95 20" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
    <svg class="krijt" style="right:6%; top:36%; width:8vmin" viewBox="0 0 100 60">
      <circle cx="30" cy="30" r="20" stroke="#fff" stroke-width="4" fill="none"/>
      <path d="M60 45 L90 15" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg>
    <svg class="speelkist" style="height:24%" viewBox="0 0 220 70" preserveAspectRatio="xMidYMax meet">
      <rect x="20" y="24" width="180" height="44" rx="7" fill="#a86b32" stroke="#6f4218" stroke-width="4"/>
      <path d="M20 32 Q110 -8 200 32 Z" fill="#c98a4b" stroke="#6f4218" stroke-width="4"/>
      <rect x="98" y="28" width="24" height="18" rx="4" fill="#ffd93b" stroke="#6f4218" stroke-width="3"/>
      <circle cx="110" cy="37" r="3" fill="#6f4218"/>
    </svg>`);
  zwevers(body, ["✏️", "⭐"], 3);

  const veld = document.createElement("div");
  veld.style.cssText = "position:absolute; inset:0;";
  body.appendChild(veld);

  function bouw() {
    veld.innerHTML = "";
    const keuze = shuffle(VORMEN).slice(0, 4);
    const doelen = shuffle(keuze);
    const maat = Math.min(body.clientWidth / 5.2, body.clientHeight / 3.6, 150);
    let klaar = 0;

    doelen.forEach((v, i) => {
      const slot = document.createElement("div");
      slot.dataset.vorm = v.id;
      slot.className = "vorm-slot";
      slot.style.cssText = `position:absolute; width:${maat}px; height:${maat}px;
        left:${(i + 0.35) * (body.clientWidth / 4.7)}px; top:7%;
        background:#fff9ec; border:.4vmin solid #e8d9b8;
        box-shadow: 0 .5vmin .8vmin rgba(0,0,0,.3); border-radius:10px; padding:8px;
        transform: rotate(${randInt(-3, 3)}deg);`;
      slot.innerHTML = `
        <span style="position:absolute; top:-1.9vmin; left:50%; transform:translateX(-50%);
          font-size:2.6vmin; filter:drop-shadow(1px 2px 1px rgba(0,0,0,.35))">📌</span>
        <svg viewBox="0 0 100 100" style="width:100%;height:100%;opacity:.45">${v.svg("#555")}</svg>`;
      veld.appendChild(slot);
    });

    keuze.forEach((v, i) => {
      const stuk = document.createElement("div");
      stuk.dataset.vorm = v.id;
      stuk.style.cssText = `width:${maat}px; height:${maat}px; padding:6px;`;
      stuk.style.left = (i + 0.35) * (body.clientWidth / 4.7) + randInt(-16, 16) + "px";
      stuk.style.top = body.clientHeight - maat - 30 + "px";
      stuk.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%;height:100%">${v.svg(v.kleur)}</svg>`;
      veld.appendChild(stuk);
      const thuisL = stuk.style.left, thuisT = stuk.style.top;

      maakSleepbaar(stuk, {
        onDrop() {
          const m = midden(stuk);
          let geplaatst = false;
          veld.querySelectorAll(".vorm-slot").forEach(slot => {
            if (slot.dataset.bezet) return;
            const sm = midden(slot);
            if (Math.hypot(m.x - sm.x, m.y - sm.y) < maat * 0.5) {
              if (slot.dataset.vorm === stuk.dataset.vorm) {
                const bo = body.getBoundingClientRect();
                const sr = slot.getBoundingClientRect();
                stuk.style.left = sr.left - bo.left + "px";
                stuk.style.top = sr.top - bo.top + "px";
                stuk.classList.add("locked");
                slot.dataset.bezet = "1";
                sfx.plop();
                geplaatst = true;
                klaar++;
                if (klaar === 4) {
                  moedigAan();
                  confetti(25);
                  ronde++;
                  if (ronde % 2 === 0) setTimeout(() => awardSticker(), 700);
                  setTimeout(bouw, 2800);
                }
              } else {
                probeerNog();
                stuk.style.left = thuisL;
                stuk.style.top = thuisT;
                geplaatst = true;
              }
            }
          });
          if (!geplaatst) sfx.klik();
        },
      });
    });
  }

  bouw();
  speak(`${NAAM}, sleep elke vorm naar zijn eigen schaduw!`);
};

    for (let i = 0; i < n; i++) {
      const s = document.createElement("span");
      s.textContent = ding.emoji;
      s.style.animationDelay = Math.random() * 2 + "s";
      stage.appendChild(s);
    }
    const antwoorden = new Set([n]);
    while (antwoorden.size < 3) {
      const kandidaat = Math.max(1, Math.min(10, n + randInt(-3, 3)));
      antwoorden.add(kandidaat);
    }
    const row = $("#count-answers");
    shuffle([...antwoorden]).forEach(a => {

        }
      });
      row.appendChild(b);
    });
    speak(`${NAAM}, hoeveel ${ding.naam} zie je?`);
  }

  ronde();
};

scenes.kleuren = function (app) {
  const body = roomTop(app, "🎨 Kleuren maar!", "linear-gradient(160deg, #B584F0, #7B3FC4)");
  const top = app.querySelector(".room-top");
  const platenRow = document.createElement("div");
  platenRow.className = "choice-row";
  platenRow.innerHTML = `
    <button class="level-btn" data-plaat="kat">😺</button>
    <button class="level-btn" data-plaat="raket">🚀</button>
    <button class="level-btn" data-plaat="vis">🐟</button>
    <button class="level-btn" data-plaat="auto">🏎️</button>
    <button class="level-btn" data-plaat="dino">🦖</button>
    <button class="level-btn" data-plaat="kasteel">🏰</button>
    <button class="level-btn" id="paint-clear">🧽</button>`;
  top.appendChild(platenRow);

  body.innerHTML = `
    <div id="paint-wrap">
      <div id="paint-tools"></div>
      <div id="paint-board">
        <canvas id="paint-canvas"></canvas>
        <svg id="paint-outline" viewBox="0 0 700 500" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>`;

  const canvas = $("#paint-canvas");
  const board = $("#paint-board");
  const g = canvas.getContext("2d");
  let kleur = PALET[0];
  let dikte = 18;
  let strepen = 0;
  let stickerGegeven = false;

  function maten() {
    canvas.width = board.clientWidth;
    canvas.height = board.clientHeight;
    g.fillStyle = "#fff";
    g.fillRect(0, 0, canvas.width, canvas.height);
  }
  maten();

  const tools = $("#paint-tools");
  PALET.forEach(k => {
    const b = document.createElement("button");
    b.className = "paint-color";
    b.style.background = k;
    b.addEventListener("click", () => {
      sfx.klik();
      kleur = k;
      tools.querySelectorAll(".paint-color").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
    });
    tools.appendChild(b);
  });
  tools.firstChild.classList.add("active");
  [["🖌️", 10], ["🖍️", 22], ["🪣", 44]].forEach(([icoon, d]) => {
    const b = document.createElement("button");
    b.className = "icon-btn";
    b.textContent = icoon;
    b.addEventListener("click", () => { sfx.klik(); dikte = d; });
    tools.appendChild(b);
  });

  function zetPlaat(naam) {
    $("#paint-outline").innerHTML = KLEURPLATEN[naam];
    platenRow.querySelectorAll("[data-plaat]").forEach(b => b.classList.toggle("active", b.dataset.plaat === naam));
  }
  zetPlaat("kat");

  platenRow.querySelectorAll("[data-plaat]").forEach(b =>
    b.addEventListener("click", () => { sfx.plop(); zetPlaat(b.dataset.plaat); })
  );
  $("#paint-clear").addEventListener("click", () => {
    sfx.boing();
    g.fillStyle = "#fff";
    g.fillRect(0, 0, canvas.width, canvas.height);
    speak(`Een lekker schoon vel, ${NAAM}!`);
  });

  let tekent = false, vx = 0, vy = 0;
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    return [e.clientX - r.left, e.clientY - r.top];
  }
  canvas.addEventListener("pointerdown", e => {
    tekent = true;
    canvas.setPointerCapture(e.pointerId);
    [vx, vy] = pos(e);
    g.fillStyle = kleur;
    g.beginPath();
    g.arc(vx, vy, dikte / 2, 0, Math.PI * 2);
    g.fill();
  });
  canvas.addEventListener("pointermove", e => {
    if (!tekent) return;
    const [x, y] = pos(e);
    g.strokeStyle = kleur;
    g.lineWidth = dikte;
    g.lineCap = "round";
    g.beginPath();
    g.moveTo(vx, vy);
    g.lineTo(x, y);
    g.stroke();
    [vx, vy] = [x, y];
  });
  canvas.addEventListener("pointerup", () => {
    if (!tekent) return;
    tekent = false;
    strepen++;
    if (strepen === 15 && !stickerGegeven) {
      stickerGegeven = true;
      speak(`Wat een mooie tekening, ${NAAM}!`);
      setTimeout(() => awardSticker(), 800);
    }
  });

  speak(`${NAAM}, kies een kleur en maak de mooiste tekening!`);
};

  body.innerHTML = `<div id="book-wrap"><div id="sticker-shelf"></div><div id="book-page"></div></div>`;
  const shelf = $("#sticker-shelf");
  const page = $("#book-page");
  const s = stickerState();

  let ringen = "";
  for (let i = 0; i < 7; i++) ringen += `<span class="ring" style="top:${9 + i * 12.5}%"></span>`;
  decorLaag(page, `${ringen}
    <span class="washi" style="left:-2.5vmin; top:3vmin; transform:rotate(-38deg); background:rgba(127,212,255,.75)"></span>
    <span class="washi" style="right:-2.5vmin; top:3vmin; transform:rotate(38deg); background:rgba(255,179,224,.75)"></span>
    <span class="washi" style="left:-2.5vmin; bottom:3vmin; transform:rotate(38deg); background:rgba(127,232,154,.75)"></span>
    <span class="washi" style="right:-2.5vmin; bottom:3vmin; transform:rotate(-38deg); background:rgba(255,217,59,.75)"></span>`);

  function bewaar() {
    saveStickerState(s);
  }

  function maakSticker(i) {
    const el = document.createElement("div");
    el.className = "sticker";
    el.textContent = STICKER_POOL[i];
    el.dataset.i = i;
    const p = s.pos[i];
    if (p) {
      el.style.position = "absolute";
      el.style.left = p.x * 100 + "%";
      el.style.top = p.y * 100 + "%";
      page.appendChild(el);
    } else {
      shelf.appendChild(el);
    }
    maakSleepbaar(el, {
      onStart() {
        const r = el.getBoundingClientRect();
        const pr = page.getBoundingClientRect();
        el.style.position = "absolute";
        el.style.left = r.left - pr.left + "px";
        el.style.top = r.top - pr.top + "px";
        if (el.parentElement !== page) page.appendChild(el);
      },
      onDrop() {
        const pr = page.getBoundingClientRect();
        const m = midden(el);
        const er = el.getBoundingClientRect();
        if (m.x < pr.left || m.x > pr.right || m.y < pr.top || m.y > pr.bottom) {
          delete s.pos[el.dataset.i];
          el.style.position = "";
          el.style.left = "";
          el.style.top = "";
          shelf.appendChild(el);
          sfx.klik();
        } else {
          const x = Math.min(Math.max(er.left - pr.left, 0), pr.width - er.width) / pr.width;
          const y = Math.min(Math.max(er.top - pr.top, 0), pr.height - er.height) / pr.height;
          el.style.left = x * 100 + "%";
          el.style.top = y * 100 + "%";
          s.pos[el.dataset.i] = { x, y };
          sfx.plop();
        }
        bewaar();
      },
    });
  }

  for (let i = 0; i < STICKER_POOL.length; i++) {
    if (i < s.earned) {
      maakSticker(i);
    } else {
      const slot = document.createElement("div");
      slot.className = "sticker-locked";
      slot.textContent = "❓";
      shelf.appendChild(slot);
    }
  }

  if (s.earned === 0) {
    speak(`${NAAM}, je hebt nog geen stickers. Speel de spelletjes om stickers te verdienen!`);
  } else {
    speak(`${NAAM}, dit zijn jouw stickers! Sleep ze waar jij wilt.`);
  }
};

  if(introT<1){introT=Math.min(1,introT+dt/1.7);const e=1-Math.pow(1-introT,3);
    camera.position.lerpVectors(new THREE.Vector3(2,10,24),camEnd,e);camera.lookAt(TARGET);
    if(introT>=1){controls.update();}
  } else if(resetCam>0){resetCam=Math.max(0,resetCam-dt/0.9);
    camera.position.lerp(camEnd,0.08);controls.target.lerp(TARGET,0.1);controls.update();
  } else {controls.update();}

  for(const r of roomObjs){
    const want=(hovered&&hovered.userData.group===r.group)?1:0;
    r.hover+=(want-r.hover)*Math.min(1,dt*12);
    r.group.position.z=r.baseZ+r.hover*0.16;
    r.group.scale.setScalar(1+r.hover*0.03);
    r.panel.material.emissiveIntensity=0.05+r.hover*0.28;
  }
  if(doorBounce>0){doorBounce=Math.max(0,doorBounce-dt/0.5);const s=Math.sin(doorBounce*Math.PI);door.position.y=cyf(0)+s*0.12;door.rotation.z=Math.sin(doorBounce*Math.PI*3)*0.04*s;}

  for(const c of cats){const u=c.userData;
    u.tailG.rotation.z=Math.sin(t*2.2+u.phase)*0.5;
    u.tailG.rotation.x=Math.sin(t*1.7+u.phase)*0.12;
    u.blink-=dt;if(u.blink<0){const b=Math.max(0,1+u.blink*8);u.eyes.forEach(e=>e.scale.y=b<0.15?0.12:1);if(u.blink<-0.13){u.blink=2+Math.random()*3;u.eyes.forEach(e=>e.scale.y=1);}}
    if(u.walk&&u.legs){
      if(u.tx===undefined){u.baseY=c.position.y;u.speed=0.85+Math.random()*0.6;u.state='walk';u.timer=1+Math.random()*2;u.gait=Math.random()*7;u.tx=yardPoint(c.position);}
      const to=new THREE.Vector3().subVectors(u.tx,c.position);to.y=0;const dist=to.length();
      if(u.state==='walk'){
        const want=Math.atan2(-to.z,to.x);
        c.rotation.y=angLerp(c.rotation.y,want,dt*3.2);
        const align=Math.max(0,Math.cos(((want-c.rotation.y+Math.PI)%(2*Math.PI))-Math.PI));
        const step=u.speed*dt*(0.35+0.65*align);
        c.position.addScaledVector(to.normalize(),Math.min(step,dist));
        u.gait+=dt*u.speed*6.5;
        const gp=[0,Math.PI,Math.PI,0];
        u.legs.forEach((l,i)=>{l.rotation.z=Math.sin(u.gait+gp[i])*0.5;});
        c.position.y=u.baseY+Math.abs(Math.sin(u.gait))*0.06;
        c.rotation.z=Math.sin(u.gait)*0.035;
        c.rotation.x=-0.04+Math.sin(u.gait*2)*0.015;
        if(dist<0.35){u.state='pause';u.timer=0.8+Math.random()*2.6;}
      }else{
        u.legs.forEach(l=>l.rotation.z*=Math.pow(0.02,dt));
        c.position.y+=(u.baseY-c.position.y)*Math.min(1,dt*6);
        c.rotation.z*=Math.pow(0.05,dt);c.rotation.x*=Math.pow(0.05,dt);
        c.rotation.y+=Math.sin(t*0.6+u.phase)*dt*0.35;
        u.timer-=dt;if(u.timer<0){u.tx=yardPoint(c.position);u.state='walk';}
      }
    }else{
      c.position.y+=Math.sin(t*1.6+u.phase)*0.0009;
      c.rotation.z=Math.sin(t*1.6+u.phase)*0.02;
    }
    if(u.play&&u.paws)u.paws.forEach((l,i)=>{l.rotation.z+=Math.sin(t*5+u.phase+i*1.3)*0.01;});
  }
  if(smoke)for(const p of smoke){p.userData.ph+=dt*0.35;if(p.userData.ph>1)p.userData.ph-=1;
    const ph=p.userData.ph;p.position.y=bodyH+2.0+ph*1.6;p.position.x=1.4+Math.sin(ph*6)*0.18;
    p.material.opacity=0.6*(1-ph);p.scale.setScalar(0.5+ph*1.2);}
  if(flag)flag.rotation.y=Math.sin(t*4)*0.4;
  for(const cl of clouds){cl.position.x+=dt*0.35;if(cl.position.x>16)cl.position.x=-16;}
  for(const b of balloons){b.position.y+=Math.sin(t*1.2+b.userData.phase)*0.003;b.rotation.z=Math.sin(t*0.9+b.userData.phase)*0.08;}
  glow.material.opacity=0.3+Math.sin(t*1.5)*0.06;
  for(const b of butterflies){const u=b.userData;const ang=t*u.speed+u.off;
    b.position.set(Math.cos(ang)*u.R,u.y0+Math.sin(t*2.1+u.off)*0.35,Math.sin(ang)*u.R*0.72+1.2);
    b.rotation.y=-ang;const fl=0.35+Math.abs(Math.sin(t*9+u.off))*0.75;
    u.wl.rotation.z=fl;u.wr.rotation.z=-fl;}
  swing.rotation.x=Math.sin(t*1.15)*0.16;
  for(const s of sparkles){const k=0.75+Math.sin(t*2.6+s.userData.off*1.3)*0.45;s.scale.setScalar(Math.max(0.25,k));s.rotation.y+=dt*1.5;}
  {const e=Math.sin(t*1.5)*0.03;const k=sleeper.userData.s;sleeper.scale.set(k*(1+e),k*(1-e),k*(1+e));}
  for(const z of zzz){z.userData.ph+=dt*0.3;if(z.userData.ph>1)z.userData.ph-=1;const ph=z.userData.ph;
    z.position.set(-4.25+ph*0.3,0.85+ph*0.9,4.65);z.scale.setScalar(0.22+ph*0.3);z.material.opacity=(1-ph)*(ph<0.08?ph/0.08:1);}
  if(gradePass) gradePass.uniforms.uTime.value=t;
  if(composer) composer.render(); else renderer.render(scene,camera);
}
let composer=null,gradePass=null;

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);if(composer)composer.setSize(innerWidth,innerHeight);});
renderer.setSize(innerWidth,innerHeight);
composer=(()=>{
 try{
  const cmp=new EffectComposer(renderer);
  cmp.addPass(new RenderPass(scene,camera));
  const sao=new SAOPass(scene,camera);
  sao.params.saoBias=0.4;sao.params.saoIntensity=0.032;sao.params.saoScale=9;
  sao.params.saoKernelRadius=46;sao.params.saoBlur=true;sao.params.saoBlurRadius=8;sao.params.saoBlurStdDev=6;
  cmp.addPass(sao);
  const bloom=new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.02,0.4,0.99);
  cmp.addPass(bloom);
  const Grade={
   uniforms:{tDiffuse:{value:null},uSat:{value:1.2},uCon:{value:0.99},uWarm:{value:0.012},uVig:{value:0.34},uTime:{value:0}},
   vertexShader:'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
   fragmentShader:[
    'varying vec2 vUv;uniform sampler2D tDiffuse;uniform float uSat,uCon,uWarm,uVig,uTime;',
    'void main(){vec4 c=texture2D(tDiffuse,vUv);vec3 col=c.rgb;',
    ' float l=dot(col,vec3(0.299,0.587,0.114));col=mix(vec3(l),col,uSat);',
    ' col=(col-0.5)*uCon+0.5;',
    ' col+=vec3(uWarm,uWarm*0.35,-uWarm*0.7);',
    ' col.b+=(1.0-l)*0.015;',
    ' float d=distance(vUv,vec2(0.5));col*=smoothstep(0.9,0.35,d*uVig+0.32);',
    ' float g=fract(sin(dot(vUv*uTime,vec2(12.9898,78.233)))*43758.5453);col+=(g-0.5)*0.012;',
    ' gl_FragColor=vec4(clamp(col,0.0,1.0),c.a);}'
   ].join('')
  };
  const grade=new ShaderPass(Grade);gradePass=grade;
  cmp.addPass(grade);
  cmp.addPass(new OutputPass());
  cmp.setSize(innerWidth,innerHeight);
  return cmp;
 }catch(e){console.warn('post-fx uit:',e);return null;}
})();

// bridge naar de 2D-spellen: pauzeer/hervat de 3D-render
window.__hub3d={
  pause(){paused=true;},
  resume(){paused=false;clock.getDelta();resetCam=1;started=true;controls.autoRotate=false;
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);if(composer)composer.setSize(innerWidth,innerHeight);},
};

await document.fonts.ready.catch(()=>{});
for(const r of roomObjs){r.panel.material.map=roomTexture(r.room);r.panel.material.emissiveMap=r.panel.material.map;r.panel.material.needsUpdate=true;}
animate();
setTimeout(()=>{if(!started){controls.autoRotate=true;}},2000);
setTimeout(()=>{const l=document.getElementById('load');if(l){l.style.opacity='0';setTimeout(()=>l.remove(),500);}},700);
</script>
</body>
