<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Het Kattenhuis van Sep</title>
<style>
  :root {
    --blauw: #1e90ff;
    --groen: #2ecc40;
    --oranje: #ff851b;
    --geel: #ffd700;
    --rood: #ff4136;
    --paars: #9b59b6;
    --lucht: #7ec8ff;
    --schaduw: 0 6px 0 rgba(0,0,0,.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font-family: "Comic Sans MS", "Chalkboard SE", "Comic Neue", "Segoe UI", cursive, sans-serif;
    background: linear-gradient(#7ec8ff, #d8f3ff 70%, #9be89b);
    touch-action: none;
  }
  #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

  /* ---------- algemene knoppen ---------- */
  button {
    font-family: inherit;
    border: none;
    cursor: pointer;
  }
  .big-btn {
    font-size: clamp(20px, 4vmin, 34px);
    padding: .5em 1em;
    border-radius: 999px;
    background: var(--geel);
    box-shadow: var(--schaduw);
    transition: transform .1s;
  }
  .big-btn:active { transform: scale(.93) translateY(3px); box-shadow: none; }
  .icon-btn {
    font-size: clamp(26px, 5.5vmin, 44px);
    width: 1.9em; height: 1.9em;
    border-radius: 50%;
    background: #fff;
    box-shadow: var(--schaduw);
    display: grid; place-items: center;
    transition: transform .1s;
  }
  .icon-btn:active { transform: scale(.9); box-shadow: none; }

  /* ---------- kop van elke kamer ---------- */
  .room-top {
    display: flex; align-items: center; gap: 2vmin;
    padding: 1.2vmin clamp(64px, 12vmin, 100px) 1.2vmin 2vmin;
    flex: 0 0 auto;
  }
  .room-title {
    font-size: clamp(22px, 5vmin, 42px);
    font-weight: bold;
    color: #fff;
    text-shadow: 2px 3px 0 rgba(0,0,0,.25);
    flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .room-body { flex: 1; position: relative; overflow: hidden; }

  /* ---------- start-overlay ---------- */
  #start-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: linear-gradient(135deg, #1e90ff, #9b59b6);
    display: flex; align-items: center; justify-content: center;
  }
  #start-card {
    background: #fff;
    border-radius: 4vmin;
    padding: 4vmin 6vmin;
    text-align: center;
    box-shadow: 0 12px 0 rgba(0,0,0,.25);
    animation: pop-in .5s;
    max-width: 90vw;
  }
  #start-card h1 {
    margin: 1vmin 0 2vmin;
    font-size: clamp(26px, 6vmin, 52px);
    color: var(--blauw);
  }
  #start-card .cat-wrap { width: clamp(110px, 24vmin, 200px); margin: 0 auto; animation: floaty 2.5s ease-in-out infinite; }
  #start-btn { background: var(--groen); color: #fff; font-weight: bold; }

  /* ---------- geluid-knop ---------- */
  #sound-btn { position: fixed; top: 1.2vmin; right: 1.4vmin; z-index: 400; }

  /* ---------- het huis (hub) ---------- */
  #hub { display: flex; flex-direction: column; height: 100%; }
  #hub-title {
    text-align: center;
    font-size: clamp(24px, 5.5vmin, 46px);
    font-weight: bold;
    color: #fff;
    text-shadow: 3px 3px 0 rgba(0,0,0,.25);
    padding: 1vmin 12vmin 0.5vmin 2vmin;
  }
  #house {
    flex: 1; display: flex; flex-direction: column;
    width: min(92vw, 130vmin);
    margin: 0 auto;
    min-height: 0;
  }
  #roof {
    flex: 0 0 auto;
    height: clamp(38px, 9vmin, 80px);
    background: var(--rood);
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
    display: flex; align-items: flex-end; justify-content: center;
    color: #fff; font-weight: bold;
    font-size: clamp(14px, 3vmin, 26px);
    text-shadow: 1px 2px 0 rgba(0,0,0,.3);
    position: relative;
  }
  #rooms {
    flex: 1;
    background: #ffb45e;
    border: 1.2vmin solid #b06a2a;
    border-top: none;
    border-radius: 0 0 3vmin 3vmin;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 1.4vmin;
    padding: 1.6vmin;
    min-height: 0;
  }
  .room-door {
    border-radius: 2vmin;
    box-shadow: inset 0 -6px 0 rgba(0,0,0,.15), var(--schaduw);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: .4vmin;
    color: #fff;
    font-weight: bold;
    font-size: clamp(12px, 2.6vmin, 24px);
    transition: transform .12s;
    padding: .5vmin;
  }
  .room-door:hover { transform: scale(1.05) rotate(-1deg); }
  .room-door:active { transform: scale(.94); }
  .room-door .r-icon { font-size: clamp(28px, 7vmin, 64px); line-height: 1.1; filter: drop-shadow(2px 3px 0 rgba(0,0,0,.2)); }
  #hub-bottom {
    flex: 0 0 auto;
    display: flex; align-items: flex-end; justify-content: center;
    gap: 3vmin;
    padding: 1vmin 2vmin 1.6vmin;
    font-size: clamp(30px, 7vmin, 60px);
  }
  .hub-cat, .hub-toy {
    background: none; border: none;
    font-size: inherit;
    filter: drop-shadow(2px 4px 0 rgba(0,0,0,.2));
    transition: transform .15s;
  }
  .hub-cat:hover, .hub-toy:hover { transform: scale(1.15); }

  /* ---------- memory ---------- */
  #memory-grid {
    position: absolute; inset: 0;
    display: grid; gap: 1.5vmin;
    padding: 2vmin;
    place-content: center;
  }
  .mem-card { perspective: 600px; background: none; padding: 0; width: var(--card); height: var(--card); }
  .mem-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .35s;
  }
  .mem-card.flipped .mem-inner, .mem-card.matched .mem-inner { transform: rotateY(180deg); }
  .mem-face {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    border-radius: 1.5vmin;
    backface-visibility: hidden;
    font-size: calc(var(--card) * .55);
    box-shadow: var(--schaduw);
  }
  .mem-front { background: repeating-linear-gradient(45deg, #1e90ff 0 12px, #45a5ff 12px 24px); }
  .mem-front::after { content: "⭐"; font-size: calc(var(--card) * .4); }
  .mem-back { background: #fff; transform: rotateY(180deg); }
  .mem-card.matched .mem-back { background: #d9ffd9; animation: pop-in .4s; }

  /* ---------- puzzel & vormen ---------- */
  .drag-item { position: absolute; touch-action: none; cursor: grab; }
  .drag-item.dragging { z-index: 50; cursor: grabbing; filter: drop-shadow(0 8px 6px rgba(0,0,0,.3)); }
  .drag-item.locked { cursor: default; }
  .puz-slot-line { position: absolute; background: rgba(255,255,255,.6); }

  /* ---------- knoppenrijen ---------- */
  .choice-row {
    display: flex; gap: 1.5vmin; flex-wrap: wrap; justify-content: center; align-items: center;
  }
  .level-btn {
    font-size: clamp(16px, 3vmin, 26px);
    padding: .3em .8em;
    border-radius: 999px;
    background: rgba(255,255,255,.85);
    box-shadow: var(--schaduw);
    font-weight: bold;
  }
  .level-btn.active { background: var(--geel); transform: scale(1.08); }

  /* ---------- tellen ---------- */
  #count-stage {
    position: absolute; inset: 0 0 30% 0;
    display: flex; flex-wrap: wrap; align-content: center; justify-content: center;
    gap: 2vmin;
    font-size: clamp(36px, 9vmin, 90px);
    padding: 2vmin;
  }
  #count-stage span { animation: floaty 2s ease-in-out infinite; filter: drop-shadow(2px 4px 0 rgba(0,0,0,.15)); }
  #count-answers {
    position: absolute; left: 0; right: 0; bottom: 2vmin;
    display: flex; justify-content: center; gap: 3vmin;
  }
  .num-btn {
    font-size: clamp(30px, 7vmin, 64px);
    width: 2em; height: 2em;
    border-radius: 2vmin;
    background: #fff;
    font-weight: bold;
    color: var(--blauw);
    box-shadow: var(--schaduw);
    transition: transform .1s;
  }
  .num-btn:active { transform: scale(.9); }

  /* ---------- kleuren ---------- */
  #paint-wrap { position: absolute; inset: 0; display: flex; }
  #paint-tools {
    flex: 0 0 auto;
    display: flex; flex-direction: column; gap: 1vmin;
    padding: 1.5vmin;
    align-items: center;
    overflow-y: auto;
  }
  .paint-color {
    width: clamp(34px, 6vmin, 54px); height: clamp(34px, 6vmin, 54px);
    border-radius: 50%;
    border: 4px solid #fff;
    box-shadow: var(--schaduw);
    transition: transform .1s;
  }
  .paint-color.active { transform: scale(1.25); border-color: #333; }
  #paint-board {
    flex: 1; position: relative; margin: 1.5vmin;
    background: #fff; border-radius: 2vmin;
    box-shadow: var(--schaduw);
    overflow: hidden;
  }
  #paint-canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
  #paint-outline { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  /* ---------- verkleedkamer ---------- */
  #dress-wrap { position: absolute; inset: 0; display: flex; align-items: stretch; }
  #dress-cat { flex: 1; display: grid; place-items: center; min-width: 0; }
  #dress-cat svg { width: min(90%, 70vmin); height: 90%; }
  #dress-panel {
    flex: 0 0 auto; width: clamp(150px, 26vmin, 260px);
    display: flex; flex-direction: column; gap: 1.2vmin;
    padding: 1.5vmin; overflow-y: auto;
  }
  .dress-btn {
    font-size: clamp(16px, 3.2vmin, 28px);
    padding: .45em .6em;
    border-radius: 1.5vmin;
    background: #fff;
    box-shadow: var(--schaduw);
    font-weight: bold;
    text-align: left;
  }
  .dress-btn:active { transform: scale(.95); }

  /* ---------- speelkamer ---------- */
  #busy-grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 2vmin; padding: 2.5vmin;
  }
  .busy-cell {
    background: rgba(255,255,255,.85);
    border-radius: 2.5vmin;
    box-shadow: var(--schaduw);
    display: grid; place-items: center;
    font-size: clamp(30px, 7vmin, 64px);
    overflow: hidden;
  }
  .busy-btn {
    height: 72%; max-width: 82%; aspect-ratio: 1;
    border-radius: 50%;
    box-shadow: inset 0 -8px 0 rgba(0,0,0,.25), var(--schaduw);
    font-size: clamp(24px, 6vmin, 54px);
    display: grid; place-items: center;
  }
  .busy-btn:active { box-shadow: inset 0 4px 0 rgba(0,0,0,.25); transform: translateY(4px); }
  .lamp { transition: filter .2s, opacity .2s; opacity: .3; filter: grayscale(1); }
  .lamp.on { opacity: 1; filter: none; animation: pop-in .3s; }
  .switch {
    width: clamp(64px, 12vmin, 110px); height: clamp(36px, 6.5vmin, 60px);
    flex: 0 0 auto;
    border-radius: 999px;
    background: #ccc;
    position: relative;
    box-shadow: inset 0 4px 6px rgba(0,0,0,.25);
  }
  .switch::after {
    content: "";
    position: absolute; top: 6%; left: 4%;
    width: 46%; height: 88%;
    border-radius: 50%;
    background: #fff;
    box-shadow: var(--schaduw);
    transition: left .15s;
  }
  .switch.on { background: var(--groen); }
  .switch.on::after { left: 50%; }
  input[type=range].busy-slider { width: 80%; height: 3vmin; accent-color: var(--paars); }

  /* ---------- stickerboek ---------- */
  #book-wrap { position: absolute; inset: 0; display: flex; }
  #sticker-shelf {
    flex: 0 0 auto; width: clamp(120px, 20vmin, 200px);
    background: rgba(255,255,255,.75);
    border-radius: 2vmin;
    margin: 1.5vmin;
    padding: 1vmin;
    display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center;
    gap: 1vmin;
    overflow-y: auto;
  }
  #book-page {
    flex: 1; position: relative;
    margin: 1.5vmin;
    background: #fffbe8;
    border-radius: 2vmin;
    box-shadow: var(--schaduw);
    overflow: hidden;
  }
  #book-page::before {
    content: "Stickerboek van SEP";
    position: absolute; top: 1vmin; left: 0; right: 0;
    text-align: center;
    font-size: clamp(18px, 4vmin, 36px);
    font-weight: bold;
    color: #d8c98a;
    pointer-events: none;
  }
  .sticker {
    font-size: clamp(34px, 8vmin, 72px);
    filter: drop-shadow(2px 3px 2px rgba(0,0,0,.25));
    line-height: 1;
  }
  .sticker-locked {
    font-size: clamp(28px, 6vmin, 56px);
    opacity: .35;
    display: grid; place-items: center;
  }

  /* ---------- effecten ---------- */
  #fx-layer { position: fixed; inset: 0; pointer-events: none; z-index: 450; overflow: hidden; }
  .confetti-bit { position: absolute; top: -6vh; font-size: clamp(16px, 4vmin, 34px); animation: confetti-fall linear forwards; }
  .fly-thing { position: absolute; font-size: clamp(40px, 10vmin, 90px); animation: fly-across linear forwards; filter: drop-shadow(2px 4px 0 rgba(0,0,0,.2)); }
  .float-thing { position: absolute; font-size: clamp(36px, 9vmin, 80px); animation: float-up 2.2s ease-out forwards; }
  #big-msg {
    position: fixed; left: 50%; top: 40%;
    transform: translate(-50%, -50%);
    z-index: 460;
    font-size: clamp(30px, 8vmin, 80px);
    font-weight: bold;
    color: #fff;
    text-shadow: 3px 4px 0 rgba(0,0,0,.3);
    background: linear-gradient(135deg, var(--oranje), var(--rood));
    border-radius: 3vmin;
    padding: .4em .8em;
    pointer-events: none;
    opacity: 0;
    white-space: nowrap;
  }
  #big-msg.show { animation: msg-pop 1.8s forwards; }

  .wiggle { animation: wiggle .5s; }
  .spin-once { animation: spin-once .7s; }
  body.disco { animation: disco 0.6s linear 6; }

  @keyframes pop-in { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes wiggle { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-14deg); } 75% { transform: rotate(14deg); } }
  @keyframes spin-once { to { transform: rotate(360deg); } }
  @keyframes confetti-fall {
    to { transform: translateY(115vh) rotate(600deg); }
  }
  @keyframes fly-across {
    from { transform: translateX(-15vw) rotate(-8deg); }
    to { transform: translateX(115vw) rotate(8deg); }
  }
  @keyframes float-up {
    from { transform: translateY(0) scale(.6); opacity: 1; }
    to { transform: translateY(-45vh) scale(1.4); opacity: 0; }
  }
  @keyframes msg-pop {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0); }
    15% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
    25% { transform: translate(-50%,-50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.1); }
  }
  @keyframes disco { 0% { filter: hue-rotate(0); } 100% { filter: hue-rotate(360deg); } }
</style>
</head>
<body>
<div id="app"></div>
<div id="fx-layer"></div>
<div id="big-msg"></div>
<button id="sound-btn" class="icon-btn" title="Geluid aan/uit">🔊</button>

<div id="start-overlay">
  <div id="start-card">
    <div class="cat-wrap" id="start-cat"></div>
    <h1>Het Kattenhuis<br>van Sep</h1>
    <button id="start-btn" class="big-btn">▶ &nbsp;Spelen!</button>
  </div>
</div>

<script>
"use strict";

/* ============================================================
   Hulpjes
   ============================================================ */
const $ = sel => document.querySelector(sel);
const NAAM = "Sep";
const randInt = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ============================================================
   Geluid (WebAudio, geen bestanden)
   ============================================================ */
let audioCtx = null;
let soundOn = localStorage.getItem("kh_sound") !== "uit";

function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function tone(freq, dur = 0.15, { type = "sine", vol = 0.2, delay = 0, glide = null } = {}) {
  if (!soundOn) return;
  const ac = ctx();
  const t0 = ac.currentTime + delay;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (glide) osc.frequency.exponentialRampToValueAtTime(glide, t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.05);
}

function noiseBurst(dur = 0.2, vol = 0.25) {
  if (!soundOn) return;
  const ac = ctx();
  const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain();
  g.gain.value = vol;
  src.connect(g).connect(ac.destination);
  src.start();
}

const sfx = {
  klik()   { tone(600, 0.08, { type: "square", vol: 0.08 }); },
  plop()   { tone(300, 0.12, { type: "sine", glide: 700, vol: 0.25 }); },
  goed()   { [523, 659, 784].forEach((f, i) => tone(f, 0.15, { delay: i * 0.09, type: "triangle", vol: 0.22 })); },
  fanfare(){ [523, 659, 784, 1047, 784, 1047].forEach((f, i) => tone(f, 0.18, { delay: i * 0.12, type: "triangle", vol: 0.25 })); },
  oeps()   { tone(300, 0.25, { type: "sine", glide: 200, vol: 0.15 }); },
  miauw()  { tone(700, 0.28, { type: "sawtooth", glide: 420, vol: 0.1 }); tone(1000, 0.2, { type: "sine", glide: 500, vol: 0.08, delay: 0.05 }); },
  boing()  { tone(150, 0.3, { type: "sine", glide: 500, vol: 0.25 }); },
  toeter() { tone(220, 0.4, { type: "sawtooth", vol: 0.18 }); tone(277, 0.4, { type: "sawtooth", vol: 0.14 }); },
  trommel(){ noiseBurst(0.15, 0.3); tone(90, 0.15, { type: "sine", vol: 0.35 }); },
  bel()    { tone(880, 0.5, { type: "triangle", vol: 0.2 }); tone(1108, 0.5, { type: "triangle", vol: 0.15, delay: 0.25 }); },
  koekoek(){ tone(740, 0.25, { type: "sine", vol: 0.25 }); tone(587, 0.35, { type: "sine", vol: 0.25, delay: 0.3 }); },
};

/* ============================================================
   Nederlandse stem
   ============================================================ */
let nlVoice = null;
function findVoice() {
  const voices = speechSynthesis.getVoices();
  nlVoice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith("nl")) || null;
}
if ("speechSynthesis" in window) {
  findVoice();
  speechSynthesis.onvoiceschanged = findVoice;
}
function speak(text) {
  if (!soundOn || !("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "nl-NL";
  if (nlVoice) u.voice = nlVoice;
  u.rate = 0.95;
  u.pitch = 1.15;
  speechSynthesis.speak(u);
}

const AANMOEDIGINGEN = [
  `Goed zo, ${NAAM}!`,
  `Wauw ${NAAM}, wat kun jij dat goed!`,
  `Knap hoor, ${NAAM}!`,
  `Super, ${NAAM}!`,
  `Jaaa, gevonden!`,
  `Jij bent een echte kampioen, ${NAAM}!`,
  `Fantastisch, ${NAAM}!`,
  `Toppie, ${NAAM}!`,
];
const PROBEER_NOG = [
  `Bijna, ${NAAM}! Probeer nog een keertje.`,
  `Oeps! Probeer maar opnieuw, ${NAAM}.`,
  `Net niet! Jij kan het, ${NAAM}!`,
  `Hmm, kijk nog eens goed, ${NAAM}!`,
];
function moedigAan() { sfx.goed(); speak(pick(AANMOEDIGINGEN)); }
function probeerNog() { sfx.oeps(); speak(pick(PROBEER_NOG)); }

function bigMsg(text) {
  const el = $("#big-msg");
  el.textContent = text;
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}

/* ============================================================
   Effecten: confetti, dingen die voorbij vliegen
   ============================================================ */
const CONFETTI = ["🎉", "⭐", "🎊", "✨", "🌟", "🟠", "🔵", "🟢", "🟡", "🟣"];
function confetti(n = 26) {
  const layer = $("#fx-layer");
  for (let i = 0; i < n; i++) {
    const bit = document.createElement("div");
    bit.className = "confetti-bit";
    bit.textContent = pick(CONFETTI);
    bit.style.left = Math.random() * 100 + "vw";
    bit.style.animationDuration = 1.4 + Math.random() * 1.6 + "s";
    bit.style.animationDelay = Math.random() * 0.5 + "s";
    layer.appendChild(bit);
    setTimeout(() => bit.remove(), 3800);
  }
}
function flyAcross(emoji) {
  const layer = $("#fx-layer");
  const el = document.createElement("div");
  el.className = "fly-thing";
  el.textContent = emoji;

const STICKER_POOL = ["🦸", "🚀", "😺", "🚒", "🦖", "⭐", "🏴‍☠️", "⚽", "🌈", "🐬", "🛡️", "🏆"];
function stickerState() {
  try { return JSON.parse(localStorage.getItem("kh_stickers")) || { earned: 0, pos: {} }; }

function saveStickerState(s) { localStorage.setItem("kh_stickers", JSON.stringify(s)); }

/* ============================================================
   Sleep-hulpje (muis + touch)
   ============================================================ */
function maakSleepbaar(el, { onDrop, onStart } = {}) {
  el.classList.add("drag-item");
  el.addEventListener("pointerdown", e => {
    if (el.classList.contains("locked")) return;
    e.preventDefault();
    if (onStart) onStart(el, e);
    el.setPointerCapture(e.pointerId);
    el.classList.add("dragging");
    const startLeft = parseFloat(el.style.left) || 0;
    const startTop = parseFloat(el.style.top) || 0;
    const px = e.clientX, py = e.clientY;
    const move = ev => {
      el.style.left = startLeft + (ev.clientX - px) + "px";
      el.style.top = startTop + (ev.clientY - py) + "px";
    };
    const up = ev => {
      el.removeEventListener("pointermove", move);
      el.removeEventListener("pointerup", up);
      el.removeEventListener("pointercancel", up);
      el.classList.remove("dragging");
      if (onDrop) onDrop(el, ev);
    };
    el.addEventListener("pointermove", move);
    el.addEventListener("pointerup", up);
    el.addEventListener("pointercancel", up);
  });
}
function midden(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

const MEM_EMOJIS = ["😺", "🚀", "🦖", "⚽", "🚒", "🐟", "🌈", "🦸", "🏴‍☠️", "🐢"];

scenes.memory = function (app) {
  const body = roomTop(app, "🎴 Memory: zoek de paartjes!", "linear-gradient(#1e90ff, #7ec8ff)");
  const top = app.querySelector(".room-top");
  const lvlRow = document.createElement("div");
  lvlRow.className = "choice-row";
  lvlRow.innerHTML = `
    <button class="level-btn" data-p="4">⭐ 4</button>
    <button class="level-btn" data-p="6">⭐⭐ 6</button>
    <button class="level-btn" data-p="8">⭐⭐⭐ 8</button>`;
  top.appendChild(lvlRow);

  let bezig = false;
  let eerste = null;
  let gevonden = 0;
  let paren = 4;

  function bouw(p) {
    paren = p;
    gevonden = 0;
    eerste = null;
    bezig = false;
    lvlRow.querySelectorAll(".level-btn").forEach(b => b.classList.toggle("active", +b.dataset.p === p));
    body.innerHTML = `<div id="memory-grid"></div>`;
    const grid = $("#memory-grid");
    const kolommen = p === 4 ? 4 : p === 6 ? 4 : 4;
    const rijen = Math.ceil((p * 2) / kolommen);
    grid.style.gridTemplateColumns = `repeat(${kolommen}, var(--card))`;
    const kaartMaat = Math.min(
      (body.clientWidth - 60) / kolommen - 12,
      (body.clientHeight - 60) / rijen - 12
    );
    grid.style.setProperty("--card", Math.max(56, kaartMaat) + "px");

    const faces = shuffle(shuffle(MEM_EMOJIS).slice(0, p).flatMap(f => [f, f]));
    for (const face of faces) {
      const kaart = document.createElement("button");
      kaart.className = "mem-card";
      kaart.innerHTML = `<div class="mem-inner">
        <div class="mem-face mem-front"></div>
        <div class="mem-face mem-back">${face}</div>
      </div>`;
      kaart.dataset.face = face;
      kaart.addEventListener("click", () => draai(kaart));
      grid.appendChild(kaart);
    }
  }

  function draai(kaart) {
    if (bezig || kaart.classList.contains("flipped") || kaart.classList.contains("matched")) return;
    sfx.klik();
    kaart.classList.add("flipped");
    if (!eerste) { eerste = kaart; return; }
    bezig = true;
    const a = eerste, b = kaart;
    eerste = null;
    if (a.dataset.face === b.dataset.face) {
      setTimeout(() => {
        a.classList.add("matched"); b.classList.add("matched");
        a.classList.remove("flipped"); b.classList.remove("flipped");
        gevonden++;
        bezig = false;
        if (gevonden === paren) {
          moedigAan();
          setTimeout(() => { awardSticker(); }, 700);
          setTimeout(() => bouw(paren), 3200);
        } else {
          sfx.plop();
        }
      }, 450);
    } else {
      setTimeout(() => {
        a.classList.remove("flipped");
        b.classList.remove("flipped");
        bezig = false;
      }, 900);
    }
  }

  lvlRow.querySelectorAll(".level-btn").forEach(b =>
    b.addEventListener("click", () => { sfx.klik(); bouw(+b.dataset.p); })
  );

  bouw(4);
  speak(`${NAAM}, zoek de twee plaatjes die hetzelfde zijn!`);
};

scenes.puzzel = function (app) {
  const body = roomTop(app, "🧩 Puzzel: sleep de stukjes!", "linear-gradient(#2ecc40, #b8f0b8)");
  const top = app.querySelector(".room-top");
  const lvlRow = document.createElement("div");
  lvlRow.className = "choice-row";
  lvlRow.innerHTML = `
    <button class="level-btn" data-g="2,2">⭐ 4</button>
    <button class="level-btn" data-g="3,2">⭐⭐ 6</button>
    <button class="level-btn" data-g="3,3">⭐⭐⭐ 9</button>`;
  top.appendChild(lvlRow);

  let sceneIdx = randInt(0, PUZZEL_SCENES.length - 1);
  let grid = [2, 2];

  function sceneSVG(binnen, vb) {
    return `<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;display:block">${binnen}</svg>`;
  }

  function bouw() {
    lvlRow.querySelectorAll(".level-btn").forEach(b => b.classList.toggle("active", b.dataset.g === grid.join(",")));
    body.innerHTML = "";
    const scene = PUZZEL_SCENES[sceneIdx];
    const [cols, rows] = grid;
    const totaal = cols * rows;

    const bordMaat = Math.min(body.clientHeight * 0.62, body.clientWidth * 0.55, 460);
    const bord = document.createElement("div");
    bord.style.cssText = `position:absolute; left:3vmin; top:50%; transform:translateY(-56%);
      width:${bordMaat}px; height:${bordMaat}px; border-radius:12px; overflow:hidden;
      box-shadow: var(--schaduw); background:#fff;`;
    bord.innerHTML = `<div style="position:absolute;inset:0;opacity:.28">${sceneSVG(scene.svg, "0 0 300 300")}</div>`;
    body.appendChild(bord);
    for (let c = 1; c < cols; c++) {
      const l = document.createElement("div");
      l.className = "puz-slot-line";
      l.style.cssText = `left:${(c / cols) * 100}%; top:0; bottom:0; width:2px;`;
      bord.appendChild(l);
    }
    for (let r = 1; r < rows; r++) {
      const l = document.createElement("div");
      l.className = "puz-slot-line";
      l.style.cssText = `top:${(r / rows) * 100}%; left:0; right:0; height:2px;`;
      bord.appendChild(l);
    }

    const stukW = bordMaat / cols, stukH = bordMaat / rows;
    const bordRect = () => bord.getBoundingClientRect();
    const bodyRect = () => body.getBoundingClientRect();
    let klaar = 0;

    const rijenTray = Math.ceil(totaal / 2);
    const rijAfstand = Math.min(stukH + 12, (body.clientHeight - stukH - 28) / Math.max(1, rijenTray - 1));
    const volgorde = shuffle(Array.from({ length: totaal }, (_, i) => i));
    volgorde.forEach((i, n) => {
      const c = i % cols, r = Math.floor(i / cols);
      const stuk = document.createElement("div");
      const vb = `${(300 / cols) * c} ${(300 / rows) * r} ${300 / cols} ${300 / rows}`;
      stuk.innerHTML = sceneSVG(scene.svg, vb);
      stuk.style.width = stukW + "px";
      stuk.style.height = stukH + "px";
      stuk.style.borderRadius = "8px";
      stuk.style.overflow = "hidden";
      stuk.style.boxShadow = "0 4px 8px rgba(0,0,0,.3)";
      const kolomX = body.clientWidth - stukW - 24 - (n % 2) * (stukW + 18);
      stuk.style.left = Math.max(bordMaat + 40, kolomX - randInt(0, 14)) + "px";
      stuk.style.top = Math.min(14 + Math.floor(n / 2) * rijAfstand, body.clientHeight - stukH - 10) + "px";
      body.appendChild(stuk);

      maakSleepbaar(stuk, {
        onDrop() {
          const br = bordRect();
          const doelX = br.left + c * stukW + stukW / 2;
          const doelY = br.top + r * stukH + stukH / 2;
          const m = midden(stuk);
          const afstand = Math.hypot(m.x - doelX, m.y - doelY);
          if (afstand < Math.min(stukW, stukH) * 0.4) {
            const bo = bodyRect();
            stuk.style.left = br.left - bo.left + c * stukW + "px";
            stuk.style.top = br.top - bo.top + r * stukH + "px";
            stuk.classList.add("locked");
            stuk.style.boxShadow = "none";
            sfx.plop();
            klaar++;
            if (klaar === totaal) {
              moedigAan();
              confetti(30);
              setTimeout(() => awardSticker(), 700);
              setTimeout(() => { sceneIdx = (sceneIdx + 1) % PUZZEL_SCENES.length; bouw(); }, 3400);
            }
          } else {
            sfx.klik();
          }
        },
      });
    });
  }

  lvlRow.querySelectorAll(".level-btn").forEach(b =>
    b.addEventListener("click", () => {
      sfx.klik();
      grid = b.dataset.g.split(",").map(Number);
      bouw();
    })

scenes.vormen = function (app) {
  const body = roomTop(app, "🔷 Vormen: sleep naar de schaduw!", "linear-gradient(#ff851b, #ffd9a8)");
  let ronde = 0;

  function bouw() {
    body.innerHTML = "";
    const keuze = shuffle(VORMEN).slice(0, 4);
    const doelen = shuffle(keuze);
    const maat = Math.min(body.clientWidth / 5.2, body.clientHeight / 3.6, 150);
    let klaar = 0;

    doelen.forEach((v, i) => {
      const slot = document.createElement("div");
      slot.dataset.vorm = v.id;
      slot.className = "vorm-slot";
      slot.style.cssText = `position:absolute; width:${maat}px; height:${maat}px;
        left:${(i + 0.35) * (body.clientWidth / 4.7)}px; top:6%;
        background:rgba(255,255,255,.5); border-radius:14px; padding:6px;`;
      slot.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%;height:100%;opacity:.45">${v.svg("#555")}</svg>`;
      body.appendChild(slot);
    });

    keuze.forEach((v, i) => {
      const stuk = document.createElement("div");
      stuk.dataset.vorm = v.id;
      stuk.style.cssText = `width:${maat}px; height:${maat}px; padding:6px;`;
      stuk.style.left = (i + 0.35) * (body.clientWidth / 4.7) + randInt(-16, 16) + "px";
      stuk.style.top = body.clientHeight - maat - 30 + "px";
      stuk.innerHTML = `<svg viewBox="0 0 100 100" style="width:100%;height:100%">${v.svg(v.kleur)}</svg>`;
      body.appendChild(stuk);
      const thuisL = stuk.style.left, thuisT = stuk.style.top;

      maakSleepbaar(stuk, {
        onDrop() {
          const m = midden(stuk);
          let geplaatst = false;
          body.querySelectorAll(".vorm-slot").forEach(slot => {
            if (slot.dataset.bezet) return;
            const sm = midden(slot);
            if (Math.hypot(m.x - sm.x, m.y - sm.y) < maat * 0.5) {
              if (slot.dataset.vorm === stuk.dataset.vorm) {
                const bo = body.getBoundingClientRect();
                const sr = slot.getBoundingClientRect();
                stuk.style.left = sr.left - bo.left + "px";
                stuk.style.top = sr.top - bo.top + "px";
                stuk.classList.add("locked");
                slot.dataset.bezet = "1";
                sfx.plop();
                geplaatst = true;
                klaar++;
                if (klaar === 4) {
                  moedigAan();
                  confetti(25);
                  ronde++;
                  if (ronde % 2 === 0) setTimeout(() => awardSticker(), 700);
                  setTimeout(bouw, 2800);
                }
              } else {
                probeerNog();
                stuk.style.left = thuisL;
                stuk.style.top = thuisT;
                geplaatst = true;
              }
            }
          });
          if (!geplaatst) sfx.klik();
        },
      });
    });
  }

  bouw();
  speak(`${NAAM}, sleep elke vorm naar zijn eigen schaduw!`);
};

    body.innerHTML = `<div id="count-stage"></div><div id="count-answers"></div>`;

scenes.kleuren = function (app) {
  const body = roomTop(app, "🎨 Kleuren maar!", "linear-gradient(#ff4136, #ffc2b8)");
  const top = app.querySelector(".room-top");
  const platenRow = document.createElement("div");

    <button class="level-btn" data-plaat="kat">😺</button>
    <button class="level-btn" data-plaat="raket">🚀</button>
    <button class="level-btn" data-plaat="vis">🐟</button>
    <button class="level-btn" id="paint-clear">🧽 Nieuw vel</button>`;
  top.appendChild(platenRow);

  body.innerHTML = `
    <div id="paint-wrap">
      <div id="paint-tools"></div>
      <div id="paint-board">
        <canvas id="paint-canvas"></canvas>
        <svg id="paint-outline" viewBox="0 0 700 500" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>`;

  const canvas = $("#paint-canvas");
  const board = $("#paint-board");
  const g = canvas.getContext("2d");
  let kleur = PALET[0];
  let dikte = 18;
  let strepen = 0;
  let stickerGegeven = false;

  function maten() {
    canvas.width = board.clientWidth;
    canvas.height = board.clientHeight;
    g.fillStyle = "#fff";
    g.fillRect(0, 0, canvas.width, canvas.height);
  }
  maten();

  const tools = $("#paint-tools");
  PALET.forEach(k => {
    const b = document.createElement("button");
    b.className = "paint-color";
    b.style.background = k;
    b.addEventListener("click", () => {
      sfx.klik();
      kleur = k;
      tools.querySelectorAll(".paint-color").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
    });
    tools.appendChild(b);
  });
  tools.firstChild.classList.add("active");
  [["🖌️", 10], ["🖍️", 22], ["🪣", 44]].forEach(([icoon, d]) => {
    const b = document.createElement("button");
    b.className = "icon-btn";
    b.textContent = icoon;
    b.addEventListener("click", () => { sfx.klik(); dikte = d; });
    tools.appendChild(b);
  });

  function zetPlaat(naam) {
    $("#paint-outline").innerHTML = KLEURPLATEN[naam];
    platenRow.querySelectorAll("[data-plaat]").forEach(b => b.classList.toggle("active", b.dataset.plaat === naam));
  }
  zetPlaat("kat");

  platenRow.querySelectorAll("[data-plaat]").forEach(b =>
    b.addEventListener("click", () => { sfx.plop(); zetPlaat(b.dataset.plaat); })
  );
  $("#paint-clear").addEventListener("click", () => {
    sfx.boing();
    g.fillStyle = "#fff";
    g.fillRect(0, 0, canvas.width, canvas.height);
    speak(`Een lekker schoon vel, ${NAAM}!`);
  });

  let tekent = false, vx = 0, vy = 0;
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    return [e.clientX - r.left, e.clientY - r.top];
  }
  canvas.addEventListener("pointerdown", e => {
    tekent = true;
    canvas.setPointerCapture(e.pointerId);
    [vx, vy] = pos(e);
    g.fillStyle = kleur;
    g.beginPath();
    g.arc(vx, vy, dikte / 2, 0, Math.PI * 2);
    g.fill();
  });
  canvas.addEventListener("pointermove", e => {
    if (!tekent) return;
    const [x, y] = pos(e);
    g.strokeStyle = kleur;
    g.lineWidth = dikte;
    g.lineCap = "round";
    g.beginPath();
    g.moveTo(vx, vy);
    g.lineTo(x, y);
    g.stroke();
    [vx, vy] = [x, y];
  });
  canvas.addEventListener("pointerup", () => {
    if (!tekent) return;
    tekent = false;
    strepen++;
    if (strepen === 15 && !stickerGegeven) {
      stickerGegeven = true;
      speak(`Wat een mooie tekening, ${NAAM}!`);
      setTimeout(() => awardSticker(), 800);
    }
  });

  speak(`${NAAM}, kies een kleur en maak de mooiste tekening!`);
};

    cel(b);

  const lampen = [];
  for (let i = 0; i < 2; i++) {

    wrap.append(sw, lamp);
    cel(wrap);
    lampen.push(lamp);

  const sliderWrap = document.createElement("div");
  sliderWrap.style.cssText = "display:flex;flex-direction:column;align-items:center;gap:1vmin;width:100%";
  sliderWrap.innerHTML = `<span style="font-size:.7em">🎚️</span>`;
  const slider = document.createElement("input");
  slider.type = "range";
  slider.className = "busy-slider";
  slider.min = 200; slider.max = 1000; slider.value = 500;
  slider.addEventListener("input", () => tone(+slider.value, 0.08, { type: "sine", vol: 0.12 }));
  sliderWrap.appendChild(slider);
  cel(sliderWrap);

  const toeter = document.createElement("button");
  toeter.className = "busy-btn";
  toeter.style.background = "#ff851b";
  toeter.textContent = "📯";
  toeter.addEventListener("click", () => { sfx.toeter(); toeter.classList.remove("wiggle"); void toeter.offsetWidth; toeter.classList.add("wiggle"); });
  cel(toeter);

  const trommel = document.createElement("button");
  trommel.className = "busy-btn";
  trommel.style.background = "#c39b77";
  trommel.textContent = "🥁";
  trommel.addEventListener("pointerdown", () => sfx.trommel());
  cel(trommel);

  const disco = document.createElement("button");
  disco.className = "busy-btn";
  disco.style.background = "#9b59b6";
  disco.textContent = "🪩";
  disco.addEventListener("click", () => {
    document.body.classList.remove("disco");
    void document.body.offsetWidth;
    document.body.classList.add("disco");
    [523, 659, 784, 659, 523, 784].forEach((f, i) => tone(f, 0.15, { delay: i * 0.15, type: "square", vol: 0.12 }));
    confetti(15);
  });
  cel(disco);

  const VERRASSINGEN = [
    () => { flyAcross("🚀"); tone(200, 0.6, { glide: 900, type: "sawtooth", vol: 0.15 }); },
    () => { flyAcross("🐉"); sfx.boing(); },
    () => { flyAcross("🦋"); tone(800, 0.3, { glide: 1200, vol: 0.12 }); },
    () => { flyAcross("😺"); sfx.miauw(); },
    () => { flyAcross("🛸"); tone(600, 0.7, { glide: 300, type: "sine", vol: 0.15 }); },
    () => { floatUp("🎈"); sfx.plop(); },
    () => { floatUp("⚽"); sfx.boing(); },
    () => { confetti(20); sfx.fanfare(); },
    () => { floatUp("🐸"); tone(300, 0.15, { glide: 600, type: "square", vol: 0.15 }); speak("Kwaak!"); },
  ];
  for (let i = 0; i < 3; i++) {
    const doos = document.createElement("button");
    doos.className = "busy-btn";
    doos.style.background = ["#ffd700", "#2ecc40", "#1e90ff"][i];
    doos.textContent = "🎁";
    doos.addEventListener("click", () => {
      doos.classList.remove("wiggle");
      void doos.offsetWidth;
      doos.classList.add("wiggle");
      sfx.plop();
      pick(VERRASSINGEN)();
    });
    cel(doos);
  }

  speak(`${NAAM}, dit is jouw speelkamer! Druk maar op alle knopjes en kijk wat er gebeurt!`);
};

/* ============================================================
   STICKERBOEK
   ============================================================ */
scenes.stickers = function (app) {
  const body = roomTop(app, `⭐ Stickerboek van ${NAAM}`, "linear-gradient(#ffb700, #ffe9a8)");
  body.innerHTML = `<div id="book-wrap"><div id="sticker-shelf"></div><div id="book-page"></div></div>`;
  const shelf = $("#sticker-shelf");
  const page = $("#book-page");
  const s = stickerState();

  function bewaar() {
    saveStickerState(s);
  }

  function maakSticker(i) {
    const el = document.createElement("div");
    el.className = "sticker";
    el.textContent = STICKER_POOL[i];
    el.dataset.i = i;
    const p = s.pos[i];
    if (p) {
      el.style.position = "absolute";
      el.style.left = p.x * 100 + "%";
      el.style.top = p.y * 100 + "%";
      page.appendChild(el);
    } else {
      shelf.appendChild(el);
    }
    maakSleepbaar(el, {
      onStart() {
        const r = el.getBoundingClientRect();
        const pr = page.getBoundingClientRect();
        el.style.position = "absolute";
        el.style.left = r.left - pr.left + "px";
        el.style.top = r.top - pr.top + "px";
        if (el.parentElement !== page) page.appendChild(el);
      },
      onDrop() {
        const pr = page.getBoundingClientRect();
        const m = midden(el);
        const er = el.getBoundingClientRect();
        if (m.x < pr.left || m.x > pr.right || m.y < pr.top || m.y > pr.bottom) {
          delete s.pos[el.dataset.i];
          el.style.position = "";
          el.style.left = "";
          el.style.top = "";
          shelf.appendChild(el);
          sfx.klik();
        } else {
          const x = Math.min(Math.max(er.left - pr.left, 0), pr.width - er.width) / pr.width;
          const y = Math.min(Math.max(er.top - pr.top, 0), pr.height - er.height) / pr.height;
          el.style.left = x * 100 + "%";
          el.style.top = y * 100 + "%";
          s.pos[el.dataset.i] = { x, y };
          sfx.plop();
        }
        bewaar();
      },
    });
  }

  for (let i = 0; i < STICKER_POOL.length; i++) {
    if (i < s.earned) {
      maakSticker(i);
    } else {
      const slot = document.createElement("div");
      slot.className = "sticker-locked";
      slot.textContent = "❓";
      shelf.appendChild(slot);
    }
  }

  if (s.earned === 0) {
    speak(`${NAAM}, je hebt nog geen stickers. Speel de spelletjes om stickers te verdienen!`);
  } else {
    speak(`${NAAM}, dit zijn jouw stickers! Sleep ze waar jij wilt.`);
  }
};
